<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050810;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0;touch-action:none}

/* ── NUI (touch only) ─────────────────────────────────────────── */
#nui,#nui-pause{display:none}
@media(pointer:coarse){#nui,#nui-pause{display:flex}}

#nui{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--nui-h,190px);z-index:50;
  pointer-events:none;align-items:flex-end;
  justify-content:space-between;
  padding:0 clamp(12px,4vw,32px) clamp(10px,2.5vh,22px);
  background:linear-gradient(to top,rgba(5,8,16,.80) 0%,transparent 100%);
}
#nui-move{display:flex;flex-direction:column;align-items:center;gap:clamp(5px,1.2vh,10px);pointer-events:none}
#nui-lr-row{display:flex;align-items:center;gap:clamp(6px,2.2vw,14px)}
#nui-act{display:flex;flex-direction:column;align-items:center;gap:clamp(5px,1.2vh,10px);pointer-events:none}

.nb{
  pointer-events:all;touch-action:none;-webkit-tap-highlight-color:transparent;
  -webkit-appearance:none;appearance:none;outline:none;cursor:pointer;
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:var(--nb-sz,clamp(60px,13vw,88px));height:var(--nb-sz,clamp(60px,13vw,88px));
  border-radius:12px;background:rgba(5,10,24,.70);
  border:1.5px solid rgba(80,200,255,.25);
  box-shadow:0 0 12px rgba(60,180,255,.10),inset 0 0 10px rgba(60,160,255,.04);
  color:rgba(80,210,255,.70);font-family:'Courier New',monospace;
  font-weight:bold;font-size:clamp(18px,5vw,28px);
  animation:nb-appear .4s ease both;
  transition:background .06s,border-color .06s,box-shadow .06s,color .06s,transform .06s;
}
.nb-lbl{font-size:clamp(7px,1.5vw,9px);letter-spacing:.12em;margin-top:2px;opacity:.60}
.nb:active,.nb.hit{
  background:rgba(60,190,255,.13);border-color:rgba(80,220,255,.85);
  color:#00ffff;transform:scale(.92);
  box-shadow:0 0 22px rgba(60,200,255,.55),0 0 44px rgba(60,200,255,.18),inset 0 0 12px rgba(60,200,255,.10);
}
.nb-rot{
  --nb-sz:clamp(72px,16vw,104px);border-radius:50%;
  border-color:rgba(255,200,80,.30);color:rgba(255,210,80,.80);
  font-size:clamp(10px,2.5vw,14px);letter-spacing:.16em;
  box-shadow:0 0 14px rgba(255,180,0,.14),inset 0 0 12px rgba(255,170,0,.05);
  animation-delay:.12s;
}
.nb-rot .nb-dot{font-size:clamp(24px,5.5vw,36px);line-height:1;margin-bottom:2px}
.nb-rot:active,.nb-rot.hit{
  background:rgba(255,200,0,.13);border-color:rgba(255,215,0,.92);color:#ffe000;
  box-shadow:0 0 24px rgba(255,200,0,.60),0 0 50px rgba(255,200,0,.22),inset 0 0 14px rgba(255,200,0,.10);
}
#nui-pause{
  position:fixed;top:clamp(6px,1.5vh,12px);left:50%;transform:translateX(-50%);
  z-index:60;pointer-events:all;touch-action:none;-webkit-tap-highlight-color:transparent;
  -webkit-appearance:none;appearance:none;outline:none;cursor:pointer;
  align-items:center;justify-content:center;
  width:44px;height:36px;border-radius:8px;
  background:rgba(5,12,28,.70);border:1.5px solid rgba(80,190,255,.28);
  color:rgba(80,210,255,.72);font-family:'Courier New',monospace;
  font-size:13px;font-weight:bold;letter-spacing:2px;
  box-shadow:0 0 10px rgba(60,170,255,.12);
  transition:background .06s,border-color .06s,box-shadow .06s;
}
#nui-pause:active,#nui-pause.hit{background:rgba(60,190,255,.14);border-color:rgba(80,220,255,.82);color:#00ffff;box-shadow:0 0 18px rgba(60,200,255,.5)}
#nui-pause[data-state="paused"]{border-color:rgba(255,220,0,.5);color:rgba(255,220,0,.85);box-shadow:0 0 12px rgba(255,200,0,.2);letter-spacing:0;font-size:15px}
@media(pointer:coarse)and(orientation:landscape){
  #nui{--nui-h:clamp(110px,24vh,145px)}
  .nb{--nb-sz:clamp(50px,10.5vw,74px)}
  .nb-rot{--nb-sz:clamp(63px,13.5vw,88px)}
}
@keyframes nb-appear{from{opacity:0;transform:translateY(16px) scale(.88)}to{opacity:1;transform:none}}

<body>
<canvas id="c"></canvas>

<div id="nui" aria-label="Game controls" role="group">
  <div id="nui-move" role="group" aria-label="Movement">
    <div id="nui-lr-row">
      <button class="nb" id="nb-left" aria-label="Move left"><span>◄</span><span class="nb-lbl">LEFT</span></button>
      <button class="nb" id="nb-right" aria-label="Move right"><span>►</span><span class="nb-lbl">RIGHT</span></button>
    </div>
    <button class="nb" id="nb-down" aria-label="Soft drop" style="width:var(--nb-sz,clamp(60px,13vw,88px));height:calc(var(--nb-sz,clamp(60px,13vw,88px)) * 0.72)"><span>▼</span><span class="nb-lbl">DROP</span></button>
  </div>
  <div id="nui-act" role="group" aria-label="Actions">
    <button class="nb nb-rot" id="nb-rotate" aria-label="Rotate">
      <span class="nb-dot">↻</span><span class="nb-lbl">ROTATE</span>
    </button>
    <button class="nb" id="nb-harddrop" aria-label="Hard drop" style="width:var(--nb-sz,clamp(60px,13vw,88px));height:calc(var(--nb-sz,clamp(60px,13vw,88px)) * 0.72)"><span>⬇</span><span class="nb-lbl">SLAM</span></button>
  </div>
</div>
<button id="nui-pause" aria-label="Pause" data-state="playing">II</button>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  T E T R I S  ·  O B L I T E R A T U S
//  Classic block stacker · Shockwave physics · Explosive line clears
//  FTS Arcade · Open Source · Free Forever
// ═══════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, BOARD_X, BOARD_Y, CELL, BOARD_W, BOARD_H;
let nuiActive = false;

// ── Board config ──────────────────────────────────────────────────────
const COLS = 10;
const ROWS = 20;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Fit board to screen: leave room for side panels + touch NUI
  const nuiH  = nuiActive ? Math.min(190, H * 0.26) : 0;
  const maxH  = H - nuiH - 16;
  const maxW  = W;
  CELL        = Math.min(Math.floor(maxH / ROWS), Math.floor(maxW * 0.55 / COLS));
  CELL        = Math.max(CELL, 18);
  BOARD_W     = CELL * COLS;
  BOARD_H     = CELL * ROWS;
  BOARD_X     = Math.floor((W - BOARD_W) / 2);
  BOARD_Y     = Math.floor((H - nuiH - BOARD_H) / 2);
  grid.init();
}
window.addEventListener('resize', resize);

// ── Maths ──────────────────────────────────────────────────────────────
const TAU    = Math.PI * 2;
const rnd    = (a, b) => a + Math.random() * (b - a);
const rndInt = (a, b) => Math.floor(rnd(a, b + 1));
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ── Audio ──────────────────────────────────────────────────────────────
let _ac = null;
const AC = () => _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)());

function tone(freq, type, dur, vol=0.2, sweep=null) {
  try {
    const ac=AC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type;
    o.frequency.setValueAtTime(sweep||freq, ac.currentTime);
    if (sweep) o.frequency.exponentialRampToValueAtTime(freq, ac.currentTime+dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  } catch(e){}
}
function noise(dur, bandFreq=150, vol=0.2) {
  try {
    const ac=AC();
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
    const d=buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(); src.buffer=buf;
    const flt=ac.createBiquadFilter(); flt.type='bandpass';
    flt.frequency.value=bandFreq; flt.Q.value=0.7;
    const g=ac.createGain();
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
    src.connect(flt); flt.connect(g); g.connect(ac.destination);
    src.start(); src.stop(ac.currentTime+dur);
  } catch(e){}
}

const SFX = {
  move:      () => tone(220,'square',0.04,0.06),
  rotate:    () => tone(380,'square',0.06,0.08,540),
  land:      () => { noise(0.12,120,0.14); tone(95,'sawtooth',0.09,0.10); },
  clear1:    () => { noise(0.25,180,0.22); tone(440,'sine',0.2,0.18,660); },
  clear2:    () => { noise(0.32,200,0.30); tone(520,'sine',0.28,0.22,880); },
  clear3:    () => { noise(0.42,230,0.38); [440,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.18,0.18),i*55)); },
  clear4:    () => { noise(0.6,260,0.5); [330,440,550,660,880,1100].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.22,0.22),i*45)); },
  levelUp:   () => [260,330,440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.15,0.2),i*70)),
  gameOver:  () => [400,300,220,160,110].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.3,0.28),i*200)),
  hardDrop:  () => { noise(0.08,80,0.12); tone(70,'sawtooth',0.06,0.12); },
};

// ── Piece definitions ─────────────────────────────────────────────────
// Each piece: color, glow, rotations (array of [col,row] offsets)
const PIECES = {
  I: { col:'#00f0ff', glow:'#0088ff',
       shapes:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]] },
  O: { col:'#ffe000', glow:'#ff8800',
       shapes:[[[1,0],[2,0],[1,1],[2,1]]] },
  T: { col:'#cc00ff', glow:'#8800cc',
       shapes:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]] },
  S: { col:'#00ff66', glow:'#00aa44',
       shapes:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]] },
  Z: { col:'#ff2222', glow:'#cc0000',
       shapes:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]] },
  J: { col:'#ff8800', glow:'#cc4400',
       shapes:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]] },
  L: { col:'#2266ff', glow:'#0033cc',
       shapes:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]] },
};
const PIECE_KEYS = Object.keys(PIECES);
// 7-bag randomizer
let bag = [];
function nextBag() {
  bag = [...PIECE_KEYS].sort(()=>Math.random()-0.5);
}
function pickPiece() {
  if (!bag.length) nextBag();
  return bag.pop();
}

// ── Color palette ──────────────────────────────────────────────────────
const BOARD_BG   = 'rgba(6,12,28,0.96)';
const BOARD_LINE = 'rgba(40,80,140,0.18)';

// ── Simplified grid background ─────────────────────────────────────────
// Static dots + wave-driven brightness — zero spring physics, zero per-frame allocation
const grid = {
  spacing: 38,
  cols: 0, rows: 0,
  // ripple waves: [{x,y,r,maxR,alpha}]
  waves: [],

  init() {
    this.cols = Math.ceil(W / this.spacing) + 2;
    this.rows = Math.ceil(H / this.spacing) + 2;
  },

  ripple(wx, wy, mag, radius) {
    this.waves.push({ x:wx, y:wy, r:0, maxR:radius, alpha:Math.min(1, mag/600) });
  },

  update(dt) {
    const speed = 320;
    for (let i = this.waves.length-1; i >= 0; i--) {
      const w = this.waves[i];
      w.r += speed * dt;
      w.alpha -= dt * 1.1;
      if (w.alpha <= 0 || w.r > w.maxR * 1.4) this.waves.splice(i, 1);
    }
  },

  draw() {
    ctx.save();
    // Draw dots; brightness lifted if inside a wave ring
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        const px = c * this.spacing - this.spacing;
        const py = r * this.spacing - this.spacing;
        let bright = 0.06;
        for (const w of this.waves) {
          const d = Math.hypot(px - w.x, py - w.y);
          const ring = Math.abs(d - w.r);
          if (ring < 28) {
            const falloff = (1 - ring/28) * w.alpha;
            bright += falloff * 0.55;
          }
        }
        bright = clamp(bright, 0, 0.8);
        ctx.fillStyle = `rgba(50,160,255,${bright})`;
        ctx.beginPath();
        ctx.arc(px, py, 1.2, 0, TAU);
        ctx.fill();
      }
    }
    ctx.restore();
  }
};

// ── Particle system ───────────────────────────────────────────────────
const particles = [];

class Spark {
  constructor(x, y, vx, vy, col, life, size) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.col=col; this.life=life; this.maxLife=life; this.size=size;
    this.dead=false;
  }
  update(dt) {
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vx*=0.94; this.vy*=0.94; this.vy+=60*dt;
    this.life-=dt;
    if(this.life<=0) this.dead=true;
  }
  draw() {
    const t=clamp(this.life/this.maxLife,0,1);
    ctx.save(); ctx.globalAlpha=t*t;
    ctx.shadowColor=this.col; ctx.shadowBlur=this.size*3*t;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*t,0,TAU); ctx.fill();
    ctx.restore();
  }
}

class BlockShard {
  constructor(x, y, col, size) {
    this.x=x; this.y=y;
    this.vx=rnd(-260,260); this.vy=rnd(-380,-60);
    this.col=col; this.size=size;
    this.angle=rnd(0,TAU); this.spin=rnd(-8,8);
    this.life=rnd(0.6,1.4); this.maxLife=this.life;
    this.dead=false;
  }
  update(dt) {
    this.vx*=0.97; this.vy+=320*dt;
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.angle+=this.spin*dt;
    this.life-=dt;
    if(this.life<=0) this.dead=true;
  }
  draw() {
    const t=clamp(this.life/this.maxLife,0,1);
    ctx.save(); ctx.globalAlpha=t;
    ctx.translate(this.x,this.y); ctx.rotate(this.angle);
    ctx.shadowColor=this.col; ctx.shadowBlur=this.size*2*t;
    ctx.fillStyle=this.col;
    ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size);
    ctx.restore();
  }
}

// ── Shockwave ring (visual only) ───────────────────────────────────────
const shockwaves = [];
class Shockwave {
  constructor(x, y, col, maxR, thick) {
    this.x=x; this.y=y; this.col=col;
    this.r=0; this.maxR=maxR; this.thick=thick;
    this.life=1; this.dead=false;
  }
  update(dt) {
    const speed = this.maxR * 3.2;
    this.r += speed * dt;
    this.life -= dt * 2.8;
    if(this.life<=0||this.r>this.maxR) this.dead=true;
  }
  draw() {
    if(this.r<=0) return;
    const t=clamp(this.life,0,1);
    ctx.save();
    ctx.globalAlpha=t*0.7;
    ctx.strokeStyle=this.col;
    ctx.lineWidth=this.thick*t;
    ctx.shadowColor=this.col; ctx.shadowBlur=12*t;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,TAU); ctx.stroke();
    ctx.restore();
  }
}

// ── Game state ─────────────────────────────────────────────────────────
let gs = {};
function initGS() {
  gs = {
    state: 'title',   // title | playing | paused | gameover
    board: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    current: null,   // {key, rot, x, y}
    next: null,
    score: 0,
    lines: 0,
    level: 1,
    paused: false,
    dropTimer: 0,
    lockTimer: 0,
    lockDelay: 0.5,
    lockOnFloor: false,
    msgTimer: 0,
    msg: '',
    clearFlash: [],   // rows currently flashing before clearing
    clearTimer: 0,
    highScore: parseInt(localStorage.getItem('tetris_ob_hi')||'0'),
  };
  nextBag(); nextBag();
}
initGS();

function dropInterval() {
  // Level-scaled gravity
  const t = Math.max(0.05, 0.8 - (gs.level-1)*0.07);
  return t;
}

function spawnPiece(key) {
  const p = PIECES[key];
  const shape = p.shapes[0];
  const minC = Math.min(...shape.map(([c])=>c));
  const maxC = Math.max(...shape.map(([c])=>c));
  const startX = Math.floor((COLS - (maxC - minC + 1)) / 2) - minC;
  return { key, rot:0, x:startX, y:0 };
}

function spawnNext() {
  gs.current = spawnPiece(gs.next || pickPiece());
  gs.next     = pickPiece();
  gs.dropTimer = 0;
  gs.lockTimer = 0;
  gs.lockOnFloor = false;
  if (!canPlace(gs.current, 0, 0)) {
    gs.state = 'gameover';
    if (gs.score > gs.highScore) {
      gs.highScore = gs.score;
      localStorage.setItem('tetris_ob_hi', gs.highScore);
    }
    SFX.gameOver();
    spawnGameOverEffect();
  }
}

function currentCells(piece, dx=0, dy=0) {
  const {key,rot,x,y} = piece;
  return PIECES[key].shapes[rot].map(([c,r])=>[x+c+dx, y+r+dy]);
}

function canPlace(piece, dx, dy, newRot) {
  const rot = (newRot !== undefined) ? newRot : piece.rot;
  const shape = PIECES[piece.key].shapes[rot];
  for (const [c,r] of shape) {
    const nc = piece.x+c+dx, nr = piece.y+r+dy;
    if (nc<0||nc>=COLS||nr>=ROWS) return false;
    if (nr>=0 && gs.board[nr][nc]) return false;
  }
  return true;
}

function lockPiece() {
  const cells = currentCells(gs.current);
  const pieceCol = PIECES[gs.current.key].col;
  const pieceGlow = PIECES[gs.current.key].glow;

  for (const [c,r] of cells) {
    if (r>=0) gs.board[r][c] = { col: pieceCol, glow: pieceGlow };
  }
  SFX.land();

  // Shockwave at landing point
  const avgRow = Math.max(...cells.map(([,r])=>r));
  const avgCol = cells.reduce((s,[c])=>s+c,0)/cells.length;
  const wx = BOARD_X + (avgCol+0.5)*CELL;
  const wy = BOARD_Y + (avgRow+1)*CELL;
  shockwaves.push(new Shockwave(wx, wy, pieceGlow, CELL*3.5, 2.5));
  grid.ripple(wx, wy, 200, 200);

  // Small sparks at each locked cell
  for (const [c,r] of cells) {
    const px = BOARD_X + (c+0.5)*CELL;
    const py = BOARD_Y + (r+0.5)*CELL;
    for (let i=0;i<5;i++) {
      particles.push(new Spark(px,py,rnd(-80,80),rnd(-120,-20),pieceCol,rnd(0.3,0.8),rnd(2,5)));
    }
  }

  checkLines();
}

function checkLines() {
  const full = [];
  for (let r=0;r<ROWS;r++) {
    if (gs.board[r].every(c=>c!==null)) full.push(r);
  }
  if (full.length===0) { spawnNext(); return; }

  gs.clearFlash = full;
  gs.clearTimer = 0.38;
  [SFX.clear1, SFX.clear2, SFX.clear3, SFX.clear4][Math.min(full.length,4)-1]();
  triggerLineClearEffect(full);
}

function triggerLineClearEffect(rows) {
  const n = rows.length;
  // Explosion scale: n^(4/3)
  const scale = Math.pow(n, 4/3);

  for (const r of rows) {
    const cy = BOARD_Y + (r+0.5)*CELL;
    for (let c=0;c<COLS;c++) {
      const cell = gs.board[r][c];
      if (!cell) continue;
      const cx = BOARD_X + (c+0.5)*CELL;
      const col = cell.col;
      const glow = cell.glow;

      // Shards
      const nShards = Math.round(3 * scale);
      for (let i=0;i<nShards;i++) {
        particles.push(new BlockShard(cx,cy,col,rnd(CELL*0.15,CELL*0.38)*scale*0.7));
      }
      // Sparks
      const nSparks = Math.round(8 * scale);
      for (let i=0;i<nSparks;i++) {
        const spd = rnd(60,320)*scale;
        const a = rnd(0,TAU);
        particles.push(new Spark(cx,cy,Math.cos(a)*spd,Math.sin(a)*spd,col,rnd(0.4,1.2)*scale*0.6,rnd(2,5)));
      }
      // Grid ripple per cell
      grid.ripple(cx, cy, 280*scale, 180*scale);
    }

    // Shockwave rings expanding outward per line
    const wx = BOARD_X + BOARD_W/2;
    const wy = BOARD_Y + (r+0.5)*CELL;
    for (let k=0;k<n;k++) {
      const delay = k*0.04;
      setTimeout(()=>{
        shockwaves.push(new Shockwave(wx, wy, '#ffffff', CELL*6*scale, 3*scale));
        shockwaves.push(new Shockwave(wx, wy, rows.length>=4?'#ffee00':'#00ffff', CELL*9*scale, 1.5*scale));
        grid.ripple(wx, wy, 600*scale, 400*scale);
      }, delay*1000);
    }
  }

  // Screen-wide mega shockwave for Tetris (4 lines)
  if (n >= 4) {
    setTimeout(()=>{
      shockwaves.push(new Shockwave(BOARD_X+BOARD_W/2, BOARD_Y+BOARD_H/2, '#ffee00', Math.max(W,H)*0.8, 5));
      shockwaves.push(new Shockwave(BOARD_X+BOARD_W/2, BOARD_Y+BOARD_H/2, '#ff8800', Math.max(W,H)*1.0, 2));
      grid.ripple(W/2, H/2, 1200, 900);
    }, 60);
  }
}

function clearLines() {
  const full = gs.clearFlash;
  const n = full.length;
  for (const r of full.slice().reverse()) {
    gs.board.splice(r, 1);
    gs.board.unshift(Array(COLS).fill(null));
  }
  gs.clearFlash = [];

  const pts = [0,100,300,500,800][n] * gs.level;
  gs.score += pts;
  gs.lines += n;
  const newLevel = Math.floor(gs.lines / 10) + 1;
  if (newLevel > gs.level) {
    gs.level = newLevel;
    gs.msg = `LEVEL ${gs.level}`;
    gs.msgTimer = 2.2;
    SFX.levelUp();
  } else {
    const msgs = ['','SINGLE','DOUBLE','TRIPLE','TETRIS ⬡'];
    gs.msg = msgs[n] || '';
    gs.msgTimer = 1.5;
  }
  spawnNext();
}

// ── Input ──────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowDown','ArrowUp'].includes(e.code)) e.preventDefault();
  if (gs.state==='title' || gs.state==='gameover') { if(['Space','Enter'].includes(e.code)) startGame(); return; }
  if (e.code==='KeyP'||e.code==='Escape') togglePause();
  if (gs.paused||gs.clearFlash.length>0) return;
  if (e.code==='ArrowLeft')  tryMove(-1,0);
  if (e.code==='ArrowRight') tryMove(1,0);
  if (e.code==='ArrowDown')  { tryMove(0,1); gs.dropTimer=0; }
  if (e.code==='ArrowUp'||e.code==='KeyX') tryRotate(1);
  if (e.code==='KeyZ') tryRotate(-1);
  if (e.code==='Space') hardDrop();
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

// DAS (delayed auto-shift)
let dasDir=0, dasTimer=0, arrTimer=0;
const DAS=0.16, ARR=0.04;

function tryMove(dx, dy) {
  if (!gs.current||gs.state!=='playing'||gs.paused) return false;
  if (canPlace(gs.current,dx,dy)) {
    gs.current.x+=dx; gs.current.y+=dy;
    if(dx!==0) SFX.move();
    // Reset lock timer on successful lateral move while on floor
    if (gs.lockOnFloor) gs.lockTimer=0;
    return true;
  }
  return false;
}

function tryRotate(dir) {
  if (!gs.current||gs.state!=='playing'||gs.paused) return;
  const piece = gs.current;
  const nRots = PIECES[piece.key].shapes.length;
  const newRot = ((piece.rot + dir) % nRots + nRots) % nRots;
  // Basic wall kick: try 0, ±1, ±2
  for (const kick of [0,-1,1,-2,2]) {
    if (canPlace(piece,kick,0,newRot)) {
      piece.rot = newRot;
      piece.x += kick;
      SFX.rotate();
      if(gs.lockOnFloor) gs.lockTimer=0;
      return;
    }
  }
}

function hardDrop() {
  if (!gs.current||gs.state!=='playing'||gs.paused||gs.clearFlash.length>0) return;
  let dy=0;
  while(canPlace(gs.current,0,dy+1)) dy++;
  gs.current.y+=dy;
  SFX.hardDrop();
  // Visual trail
  const cells = currentCells(gs.current);
  const col = PIECES[gs.current.key].col;
  for (const [c,r] of cells) {
    const px=BOARD_X+(c+0.5)*CELL, py=BOARD_Y+(r+0.5)*CELL;
    for(let i=0;i<3;i++) particles.push(new Spark(px,py,rnd(-40,40),rnd(-80,-10),col,rnd(0.2,0.5),rnd(3,6)));
  }
  gs.lockTimer=gs.lockDelay; // force immediate lock
  gs.lockOnFloor=true;
}

function ghostY() {
  if (!gs.current) return gs.current?.y;
  let dy=0;
  while(canPlace(gs.current,0,dy+1)) dy++;
  return gs.current.y+dy;
}

// ── Game flow ──────────────────────────────────────────────────────────
function startGame() {
  try { AC().resume(); } catch(e){}
  initGS();
  nextBag();
  gs.next = pickPiece();
  gs.state = 'playing';
  spawnNext();
}

function togglePause() {
  if (gs.state!=='playing') return;
  gs.paused=!gs.paused;
  const pb=document.getElementById('nui-pause');
  if(pb) { pb.dataset.state=gs.paused?'paused':'playing'; pb.textContent=gs.paused?'▶':'II'; }
}

// ── Effects ───────────────────────────────────────────────────────────
function spawnGameOverEffect() {
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const cell=gs.board[r][c];
      if(!cell) continue;
      const px=BOARD_X+(c+0.5)*CELL, py=BOARD_Y+(r+0.5)*CELL;
      setTimeout(()=>{
        for(let i=0;i<4;i++) {
          particles.push(new BlockShard(px,py,cell.col,rnd(CELL*0.15,CELL*0.4)));
          particles.push(new Spark(px,py,rnd(-180,180),rnd(-280,-40),cell.col,rnd(0.5,1.2),rnd(2,5)));
        }
        shockwaves.push(new Shockwave(px,py,cell.glow,CELL*3,1.5));
        grid.ripple(px,py,150,120);
      }, r*30+c*8);
    }

}

// ── Draw helpers ──────────────────────────────────────────────────────
function drawCell(c, r, col, glo, alpha=1, flash=false) {
  const px = BOARD_X + c*CELL;
  const py = BOARD_Y + r*CELL;
  const pad = 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (flash) {
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=CELL*1.2;
    ctx.fillStyle='#ffffff';
  } else {
    ctx.shadowColor=glo; ctx.shadowBlur=CELL*0.55;
    // Gradient fill for depth
    const grad = ctx.createLinearGradient(px+pad,py+pad,px+pad,py+CELL-pad);
    grad.addColorStop(0, lighten(col,0.35));
    grad.addColorStop(0.5, col);
    grad.addColorStop(1, darken(col,0.35));
    ctx.fillStyle=grad;
  }
  ctx.fillRect(px+pad,py+pad,CELL-pad*2,CELL-pad*2);
  // Highlight edge
  if(!flash) {
    ctx.globalAlpha=alpha*0.5;
    ctx.strokeStyle=lighten(col,0.55);
    ctx.lineWidth=1;
    ctx.strokeRect(px+pad+0.5,py+pad+0.5,CELL-pad*2-1,CELL-pad*2-1);
  }
  ctx.restore();
}

function lighten(hex, amt) {
  let n=parseInt(hex.slice(1),16);
  let r=Math.min(255,((n>>16)&255)+Math.round(amt*200));
  let g=Math.min(255,((n>>8)&255)+Math.round(amt*200));
  let b=Math.min(255,(n&255)+Math.round(amt*200));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) {
  let n=parseInt(hex.slice(1),16);
  let r=Math.max(0,((n>>16)&255)-Math.round(amt*180));
  let g=Math.max(0,((n>>8)&255)-Math.round(amt*180));
  let b=Math.max(0,(n&255)-Math.round(amt*180));
  return `rgb(${r},${g},${b})`;
}

function drawBoard() {
  // Board background
  ctx.save();
  ctx.fillStyle=BOARD_BG;
  ctx.fillRect(BOARD_X,BOARD_Y,BOARD_W,BOARD_H);

  // Grid lines
  ctx.strokeStyle=BOARD_LINE;
  ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X+c*CELL,BOARD_Y);
    ctx.lineTo(BOARD_X+c*CELL,BOARD_Y+BOARD_H);
    ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X,BOARD_Y+r*CELL);
    ctx.lineTo(BOARD_X+BOARD_W,BOARD_Y+r*CELL);
    ctx.stroke();
  }
  // Board border glow
  ctx.shadowColor='rgba(60,180,255,0.4)'; ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(60,180,255,0.35)'; ctx.lineWidth=1.5;
  ctx.strokeRect(BOARD_X,BOARD_Y,BOARD_W,BOARD_H);
  ctx.restore();

  // Locked cells
  for(let r=0;r<ROWS;r++) {
    const flash = gs.clearFlash.includes(r);
    const flashAlpha = flash ? (0.7 + 0.3*Math.sin(gs.clearTimer*TAU*8)) : 1;
    for(let c=0;c<COLS;c++) {
      const cell=gs.board[r][c];
      if(cell) drawCell(c,r,cell.col,cell.glow,flashAlpha,flash);
    }
  }

  // Ghost piece
  if(gs.current && gs.state==='playing' && !gs.paused) {
    const gy = ghostY();
    if(gy !== gs.current.y) {
      const shape = PIECES[gs.current.key].shapes[gs.current.rot];
      const col = PIECES[gs.current.key].col;
      for(const [dc,dr] of shape) {
        const c=gs.current.x+dc, r=gy+dr;
        if(r>=0&&r<ROWS&&c>=0&&c<COLS) {
          ctx.save();
          ctx.globalAlpha=0.15;
          ctx.fillStyle=col;
          ctx.fillRect(BOARD_X+c*CELL+1,BOARD_Y+r*CELL+1,CELL-2,CELL-2);
          ctx.restore();
        }
      }
    }
  }

  // Current piece
  if(gs.current && gs.state==='playing') {
    const shape = PIECES[gs.current.key].shapes[gs.current.rot];
    const col = PIECES[gs.current.key].col;
    const glo = PIECES[gs.current.key].glow;
    for(const [dc,dr] of shape) {
      const c=gs.current.x+dc, r=gs.current.y+dr;
      if(r>=0&&r<ROWS&&c>=0&&c<COLS) drawCell(c,r,col,glo);
    }
  }
}

function drawHUD() {
  const infoX = BOARD_X + BOARD_W + clamp(CELL*0.6, 8, 22);
  const infoW = Math.min(W - infoX - 8, CELL*4.5);

  ctx.save();
  ctx.font=`bold ${clamp(CELL*0.45,11,16)}px "Courier New",monospace`;
  ctx.textAlign='left';

  const label = (txt, x, y) => {
    ctx.fillStyle='rgba(60,180,255,0.5)';
    ctx.shadowBlur=0;
    ctx.fillText(txt, x, y);
  };
  const value = (txt, x, y, col='#ffffff') => {
    ctx.fillStyle=col;
    ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillText(txt, x, y);
  };

  const lh = clamp(CELL*0.7, 18, 26);
  let iy = BOARD_Y + lh;

  label('SCORE', infoX, iy); iy+=lh;
  value(gs.score.toString().padStart(7,'0'), infoX, iy, '#00ffee'); iy+=lh*1.4;

  label('LINES', infoX, iy); iy+=lh;
  value(gs.lines.toString(), infoX, iy, '#ffee00'); iy+=lh*1.4;

  label('LEVEL', infoX, iy); iy+=lh;
  value(gs.level.toString(), infoX, iy, '#ff88ff'); iy+=lh*1.4;

  label('BEST', infoX, iy); iy+=lh;
  value(gs.highScore.toString().padStart(7,'0'), infoX, iy, 'rgba(255,255,255,0.4)'); iy+=lh*2;

  // Next piece preview
  label('NEXT', infoX, iy); iy+=lh*0.8;
  if(gs.next) {
    const np = PIECES[gs.next];
    const shape = np.shapes[0];
    const minC=Math.min(...shape.map(([c])=>c));
    const maxC=Math.max(...shape.map(([c])=>c));
    const minR=Math.min(...shape.map(([,r])=>r));
    const previewCell=clamp(CELL*0.7,12,22);
    const px=infoX;
    for(const [dc,dr] of shape) {
      const cx=px+(dc-minC)*previewCell;
      const cy=iy+(dr-minR)*previewCell;
      ctx.save();
      ctx.shadowColor=np.glow; ctx.shadowBlur=previewCell*0.6;
      const grad=ctx.createLinearGradient(cx,cy,cx,cy+previewCell-2);
      grad.addColorStop(0,lighten(np.col,0.3));
      grad.addColorStop(1,darken(np.col,0.3));
      ctx.fillStyle=grad;
      ctx.fillRect(cx+1,cy+1,previewCell-2,previewCell-2);
      ctx.restore();
    }
  }

  ctx.restore();

  // Floating message
  if(gs.msgTimer>0) {
    const fa = Math.min(1,gs.msgTimer)*Math.min(1,(2-gs.msgTimer)*3);
    ctx.save(); ctx.globalAlpha=fa; ctx.textAlign='center';
    const isLevel = gs.msg.startsWith('LEVEL');
    const fs = isLevel ? clamp(CELL*1.1,22,42) : clamp(CELL*0.9,18,32);
    ctx.font=`bold ${fs}px "Courier New",monospace`;
    const col = isLevel ? '#ffee00' : (gs.msg==='TETRIS ⬡'?'#ff8800':'#00ffcc');
    ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.fillStyle=col;
    ctx.fillText(gs.msg, BOARD_X+BOARD_W/2, BOARD_Y+BOARD_H/2);
    ctx.restore();
  }
}

function drawGameOver() {

// ── Main loop ──────────────────────────────────────────────────────────
let lastTs=0;
let softDropHeld=false;

function loop(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts;

  // Update grid
  grid.update(dt);

  // Update particles
  for(let i=particles.length-1;i>=0;i--) {
    particles[i].update(dt);
    if(particles[i].dead) particles.splice(i,1);
  }
  for(let i=shockwaves.length-1;i>=0;i--) {
    shockwaves[i].update(dt);
    if(shockwaves[i].dead) shockwaves.splice(i,1);
  }

  if(gs.state==='playing' && !gs.paused) {
    if(gs.msgTimer>0) gs.msgTimer-=dt;

    // Clear animation
    if(gs.clearFlash.length>0) {
      gs.clearTimer-=dt;
      if(gs.clearTimer<=0) clearLines();
    } else {
      // DAS
      const leftDown=keys['ArrowLeft']||keys['nb-left'];
      const rightDown=keys['ArrowRight']||keys['nb-right'];
      const newDir=leftDown?-1:rightDown?1:0;
      if(newDir!==dasDir) { dasDir=newDir; dasTimer=0; arrTimer=0; }
      if(dasDir!==0) {
        dasTimer+=dt;
        if(dasTimer>=DAS) {
          arrTimer+=dt;
          if(arrTimer>=ARR) { arrTimer=0; tryMove(dasDir,0); }
        }
      }

      // Soft drop
      softDropHeld = keys['ArrowDown']||keys['nb-down'];

      // Gravity
      const interval = softDropHeld ? Math.min(0.05, dropInterval()/10) : dropInterval();
      gs.dropTimer+=dt;
      if(gs.dropTimer>=interval) {
        gs.dropTimer=0;
        if(!canPlace(gs.current,0,1)) {
          gs.lockOnFloor=true;
        } else {
          gs.current.y++;
          gs.lockOnFloor=false;
          gs.lockTimer=0;
        }
      }

      // Lock delay
      if(gs.lockOnFloor) {
        gs.lockTimer+=dt;
        if(gs.lockTimer>=gs.lockDelay) {
          gs.lockTimer=0; gs.lockOnFloor=false;
          lockPiece();
        }
      }
    }
  }

  // ── Render ─────────────────────────────────────────────────────────
  ctx.fillStyle='#050810';
  ctx.fillRect(0,0,W,H);

  grid.draw();

  for(const sw of shockwaves) sw.draw();
  for(const p of particles) p.draw();

  if(gs.state!=='title') drawBoard();
  if(gs.state==='playing'||gs.state==='gameover') drawHUD();
  if(gs.state==='title') drawTitle();
  if(gs.state==='gameover') drawGameOver();
  if(gs.state==='playing'&&gs.paused) drawPause();

  requestAnimationFrame(loop);
}

// ── Touch NUI ──────────────────────────────────────────────────────────
function setupNUI() {
  const isTouch = window.matchMedia('(pointer:coarse)').matches
               || ('ontouchstart' in window && navigator.maxTouchPoints>0);
  nuiActive = isTouch;
  if(!isTouch) return;

  document.getElementById('nui').style.display='flex';
  document.getElementById('nui-pause').style.display='flex';

  // Simple key injection
  const btnActions = {
    'nb-left':     () => tryMove(-1,0),
    'nb-right':    () => tryMove(1,0),
    'nb-down':     () => { keys['nb-down']=true; },
    'nb-rotate':   () => tryRotate(1),
    'nb-harddrop': () => hardDrop(),
  };
  const btnRelease = {
    'nb-down': () => { keys['nb-down']=false; },
  };

  for(const [id, fn] of Object.entries(btnActions)) {
    const el=document.getElementById(id); if(!el) continue;
    el.addEventListener('pointerdown',e=>{
      e.preventDefault(); el.setPointerCapture(e.pointerId);
      el.classList.add('hit');
      if(gs.state!=='playing') { startGame(); return; }
      fn();
    },{passive:false});
    const up=e=>{ e.preventDefault(); el.classList.remove('hit'); (btnRelease[id]||function(){})(); };
    el.addEventListener('pointerup',up,{passive:false});
    el.addEventListener('pointercancel',up,{passive:false});
  }

  // Repeat for left/right held
  let repeatIntervals = {};
  ['nb-left','nb-right'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.addEventListener('pointerdown',e=>{
      clearInterval(repeatIntervals[id]);
      let started=false;
      let t=setTimeout(()=>{
        repeatIntervals[id]=setInterval(()=>{
          if(id==='nb-left') tryMove(-1,0);
          else tryMove(1,0);
        }, ARR*1000);
      }, DAS*1000);
      el._clearRepeat=()=>{ clearTimeout(t); clearInterval(repeatIntervals[id]); };
    },{passive:true});
    ['pointerup','pointercancel'].forEach(ev=>{
      el.addEventListener(ev,()=>{ if(el._clearRepeat) el._clearRepeat(); },{passive:true});
    });
  });

  const pb=document.getElementById('nui-pause');
  pb.addEventListener('pointerdown',e=>{
    e.preventDefault(); pb.classList.add('hit'); togglePause();
  },{passive:false});
  pb.addEventListener('pointerup',e=>{e.preventDefault();pb.classList.remove('hit');},{passive:false});
  pb.addEventListener('pointercancel',()=>pb.classList.remove('hit'),{passive:false});

  canvas.addEventListener('pointerdown',()=>{ if(gs.state!=='playing') startGame(); },{passive:true});
}

// ── Swipe gestures ────────────────────────────────────────────────────
(function setupSwipe(){
  let sx,sy,t0;
  canvas.addEventListener('touchstart',e=>{
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; t0=Date.now();
  },{passive:true});
  canvas.addEventListener('touchend',e=>{
    if(!e.changedTouches.length||gs.state!=='playing'||gs.paused) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy, dur=(Date.now()-t0)/1000;
    const adx=Math.abs(dx),ady=Math.abs(dy);
    if(dur<0.25&&Math.max(adx,ady)>30){
      if(adx>ady) tryMove(dx>0?1:-1,0);
      else if(dy>0&&ady>40) hardDrop();
      else if(dy<0) tryRotate(1);
    }
  },{passive:true});
})();

// ── Go ─────────────────────────────────────────────────────────────────
resize();
setupNUI();
requestAnimationFrame(ts=>{ lastTs=ts; requestAnimationFrame(loop); });
</script>
