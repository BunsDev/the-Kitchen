<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- ── Twitter / X Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FishTacoStand Arcade">
    <meta name="twitter:description" content="A retro arcade hub serving Neon Invaders, Astroids, Cave Racer, RED EYE, Packman, Tetris, and more.">
    <meta name="twitter:image" content="https://frymatic.us/FTSArcade/FishTacoStand.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00d9ff;
            --neon-pink: #ff006e;
            --neon-yellow: #ffbe0b;
            --neon-green: #00ff88;
            --neon-purple: #a855f7;
            --neon-red: #ff0040;
            --dark-bg: #0a0a0f;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--dark-bg);
            font-family: 'Press Start 2P', monospace;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: url('the-Floor.png') center center / cover no-repeat;
        }

        /* Arcade floor overlay for depth */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 0;
        }

        /* CRT scan lines effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 3px
            );
            pointer-events: none;
            z-index: 1000;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 0.98; }
        }

        .cabinet-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            padding: clamp(0.5rem, 2vh, 2rem);
            position: relative;
            z-index: 1;
        }

        .arcade-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        .cabinet-base {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            border-radius: 12px;
        }

        .game-tile {
            position: absolute;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-tile img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0.85) saturate(0.9);
            transition: filter 0.4s ease-out, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* On hover: the game tile itself powers up */
        .game-tile:hover {
            z-index: 10;
        }

        .game-tile:hover img {
            filter: 
                brightness(1.4) 
                saturate(1.3) 
                drop-shadow(0 0 15px currentColor) 
                drop-shadow(0 0 30px currentColor)
                drop-shadow(0 0 45px currentColor);
            transform: scale(1.05);
            animation: tileGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes tileGlow {
            0% {
                filter: 
                    brightness(1.4) 
                    saturate(1.3) 
                    drop-shadow(0 0 15px currentColor) 
                    drop-shadow(0 0 30px currentColor)
                    drop-shadow(0 0 45px currentColor);
            }
            100% {
                filter: 
                    brightness(1.6) 
                    saturate(1.4) 
                    drop-shadow(0 0 20px currentColor) 
                    drop-shadow(0 0 40px currentColor)
                    drop-shadow(0 0 60px currentColor);
            }
        }

        /* Position game tiles on the cabinet screen - 3x2 grid layout */
        /* Top row */
        .neon-invaders {
            color: var(--neon-pink);
            left: 35.5%;
            top: 36.5%;
            width: 11.5%;
            height: 16%;
        }

        .astroids {
            color: var(--neon-green);
            left: 48.3%;
            top: 36.5%;
            width: 11.5%;
            height: 16%;
        }

        .cave-racer {
            color: var(--neon-blue);
            left: 61.1%;
            top: 36.5%;
            width: 11.5%;
            height: 16%;
        }

        /* Bottom row */
        .red-eye {
            color: var(--neon-red);
            left: 35.5%;
            top: 54%;
            width: 11.5%;
            height: 15.5%;
        }

        .pac-man {
            color: var(--neon-yellow);
            left: 48.3%;
            top: 54%;
            width: 11.5%;
            height: 15.5%;
        }

        .tetris {
            color: var(--neon-purple);
            left: 61.1%;
            top: 54%;
            width: 11.5%;
            height: 15.5%;
        }

        /* Tooltip on hover */
        .game-tile::after {
            content: attr(data-game);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: currentColor;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: clamp(6px, 1.5vh, 10px);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, bottom 0.3s;
            text-shadow: 0 0 10px currentColor;
            border: 1px solid currentColor;
        }

        .game-tile:hover::after {
            opacity: 1;
            bottom: -50px;
        }

        /* Mobile optimizations */
        @media (max-height: 500px) and (orientation: landscape) {
            .cabinet-wrapper {
                padding: clamp(0.3rem, 1vh, 1rem);
            }

            .game-tile::after {
                font-size: clamp(5px, 1.2vh, 8px);
                padding: 4px 8px;
            }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .cabinet-wrapper {
                padding: clamp(0.5rem, 2vw, 1.5rem);
            }
        }

        @media (max-width: 400px) {
            .cabinet-wrapper {
                padding: 0.5rem;
            }

            .game-tile::after {
                font-size: 6px;
                padding: 3px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="cabinet-wrapper">
        <div class="arcade-container">
            <!-- Base cabinet image -->
            <img src="the-Cabinet.png" 
                 alt="Arcade Cabinet" 
                 class="cabinet-base">
            
            <!-- Interactive game tiles -->
            <a href="https://frymatic.us/FTSArcade/neon-invaders.html" target="_blank" 
               class="game-tile neon-invaders" 
               data-game="NEON INVADERS"
               aria-label="Play Neon Invaders">
                <img src="/mnt/user-data/uploads/neon-invaders.png" alt="Neon Invaders">
            </a>
            
            <a href="https://frymatic.us/FTSArcade/astroids.html" target="_blank" 
               class="game-tile astroids" 
               data-game="ASTROIDS"
               aria-label="Play Astroids">
                <img src="astroids.png" alt="Astroids">
            </a>
            
            <a href="https://frymatic.us/FTSArcade/cave-racer.html" target="_blank" 
               class="game-tile cave-racer" 
               data-game="CAVE RACER"
               aria-label="Play Cave Racer">
                <img src="cave-racer.png" alt="Cave Racer">
            </a>
            
            <a href="https://frymatic.us/FTSArcade/redeye-hud.html" target="_blank" 
               class="game-tile red-eye" 
               data-game="RED EYE"
               aria-label="Play Red Eye">
                <img src="red-eye.png" alt="Red Eye">
            </a>
            
            <a href="https://frymatic.us/FTSArcade/packman.html" target="_blank" 
               class="game-tile pac-man" 
               data-game="PAC MAN"
               aria-label="Play Pac Man">
                <img src="packman.png" alt="Pac Man">
            </a>
            
            <a href="https://frymatic.us/FTSArcade/tetris.html" target="_blank" 
               class="game-tile tetris" 
               data-game="TETRIS"
               aria-label="Play Tetris">
                <img src="tetris.png" alt="Tetris">
            </a>
        </div>
    </div>

    <script>
        // Add sound effects on hover
        const gameTiles = document.querySelectorAll('.game-tile');
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playHoverSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'square';
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
        
        function playClickSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 1200;
            oscillator.type = 'square';
            
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }
        
        gameTiles.forEach(tile => {
            tile.addEventListener('mouseenter', () => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                playHoverSound();
            });
            
            tile.addEventListener('click', (e) => {
                playClickSound();
            });
        });

        // Konami code easter egg
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    document.body.style.animation = 'rainbow 2s linear infinite';
                    const style = document.createElement('style');
                    style.textContent = `
                        @keyframes rainbow {
                            0% { filter: hue-rotate(0deg); }
                            100% { filter: hue-rotate(360deg); }
                        }
                    `;
                    document.head.appendChild(style);
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });
    </script>
</body>
</html>
