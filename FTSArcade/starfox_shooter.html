<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTOR SQUADRON | Isometric Space Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght:400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --deep-space: #0a0015;
            --space-purple: #1a0033;
            --warning-red: #ff0055;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-space);
            overflow: hidden;
            cursor: crosshair;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, var(--space-purple) 0%, var(--deep-space) 100%);
        }
        
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            opacity: 0.6;
        }
        
        .hud-corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        #stats {
            position: absolute;
            top: 30px;
            left: 110px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .stat-line {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .stat-label {
            font-weight: 700;
            margin-right: 12px;
            min-width: 100px;
        }
        
        .stat-value {
            font-weight: 900;
            font-size: 24px;
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }
        
        #health-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: width 0.3s ease, background 0.3s ease;
        }
        
        #health-fill.low {
            background: linear-gradient(90deg, var(--warning-red), #ff6600);
            box-shadow: 0 0 20px var(--warning-red);
            animation: pulse-health 0.5s infinite;
        }
        
        @keyframes pulse-health {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        #title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            pointer-events: all;
        }
        
        #title h1 {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-magenta);
            margin-bottom: 30px;
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
            51% { opacity: 1; }
            52% { opacity: 0.98; }
        }
        
        #title p {
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--neon-magenta);
            margin-bottom: 10px;
        }
        
        #startBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--neon-magenta);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            display: none;
            pointer-events: all;
        }
        
        #gameOver h2 {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 0 30px var(--warning-red);
            color: var(--warning-red);
            margin-bottom: 20px;
        }
        
        #gameOver .final-score {
            font-size: 32px;
            color: var(--neon-yellow);
            margin-bottom: 30px;
        }
        
        #restartBtn {
            padding: 12px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-yellow), var(--neon-magenta));
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 30px var(--neon-yellow);
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 3px
            );
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }
        
        /* Mobile Controls */
        #mobileControls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        
        body.mobile #mobileControls {
            display: block;
        }
        
        .joystick-area {
            position: absolute;
            width: 150px;
            height: 150px;
            pointer-events: all;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1), rgba(0, 255, 255, 0.05));
            border: 3px solid rgba(0, 255, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan), rgba(0, 255, 255, 0.6));
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }
        
        .fire-button {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-magenta), rgba(255, 0, 255, 0.6));
            border: 4px solid var(--neon-magenta);
            box-shadow: 0 0 30px var(--neon-magenta);
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 16px;
            color: white;
            text-shadow: 0 0 10px white;
            user-select: none;
            transition: all 0.1s ease;
        }
        
        .fire-button:active {
            transform: scale(0.9);
            box-shadow: 0 0 50px var(--neon-magenta), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        /* Landscape Layout */
        body.mobile.landscape .joystick-area {
            bottom: 40px;
            left: 40px;
        }
        
        body.mobile.landscape .fire-button {
            bottom: 40px;
            right: 40px;
        }
        
        body.mobile.landscape #stats {
            top: 20px;
            left: 20px;
            font-size: 14px;
        }
        
        body.mobile.landscape .stat-line {
            margin-bottom: 4px;
        }
        
        body.mobile.landscape .stat-value {
            font-size: 18px;
        }
        
        body.mobile.landscape #health-bar {
            width: 300px;
            height: 20px;
            bottom: 20px;
        }
        
        body.mobile.landscape .hud-corner {
            width: 50px;
            height: 50px;
        }
        
        /* Portrait Layout */
        body.mobile.portrait .joystick-area {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        body.mobile.portrait .fire-button {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
        }
        
        body.mobile.portrait #stats {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        body.mobile.portrait .stat-line {
            justify-content: center;
            margin-bottom: 6px;
        }
        
        body.mobile.portrait #health-bar {
            width: 80%;
            max-width: 350px;
            bottom: auto;
            top: 20px;
        }
        
        body.mobile.portrait .hud-corner {
            display: none;
        }
        
        body.mobile.portrait #title h1 {
            font-size: 48px;
        }
        
        body.mobile.portrait #title p {
            font-size: 14px;
        }
        
        /* Orientation indicator */
        .orientation-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            z-index: 200;
            display: none;
        }
        
        .orientation-hint.show {
            display: block;
            animation: pulse-hint 1s infinite;
        }
        
        @keyframes pulse-hint {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .orientation-hint svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            stroke: var(--neon-cyan);
            fill: none;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="scanlines"></div>
    
    <!-- Mobile Controls -->
    <div id="mobileControls">
        <div class="joystick-area">
            <div class="joystick-base"></div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
        <div class="fire-button" id="fireButton">FIRE</div>
    </div>
    
    <!-- Orientation Hint -->
    <div class="orientation-hint" id="orientationHint">
        <svg viewBox="0 0 100 100">
            <rect x="20" y="35" width="60" height="30" rx="5"/>
            <path d="M 50 35 L 50 20 M 45 25 L 50 20 L 55 25"/>
        </svg>
        <div style="font-size: 16px; letter-spacing: 2px;">ROTATE TO LANDSCAPE</div>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">FOR OPTIMAL EXPERIENCE</div>
    </div>
    
    <div id="hud">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
        
        <div id="stats">
            <div class="stat-line">
                <span class="stat-label">SCORE</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">COMBO</span>
                <span class="stat-value" id="combo">×1</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">WAVE</span>
                <span class="stat-value" id="wave">1</span>
            </div>
        </div>
        
        <div id="health-bar">
            <div id="health-fill" style="width: 100%;"></div>
        </div>
        
        <div id="title">
            <h1>VECTOR SQUADRON</h1>
            <p>WASD/ARROWS TO MOVE • SPACE TO FIRE</p>
            <p>CLICK TO LOCK POINTER</p>
            <button id="startBtn">ENGAGE</button>
        </div>
        
        <div id="gameOver">
            <h2>MISSION FAILED</h2>
            <div class="final-score">FINAL SCORE: <span id="finalScore">0</span></div>
            <button id="restartBtn">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Mobile Detection and Orientation
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                        ('ontouchstart' in window);
        
        let currentOrientation = 'landscape';
        
        function detectOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            const wasPortrait = currentOrientation === 'portrait';
            currentOrientation = isPortrait ? 'portrait' : 'landscape';
            
            document.body.classList.remove('portrait', 'landscape');
            document.body.classList.add(currentOrientation);
            
            // Show orientation hint in portrait on mobile (only if playing)
            const hint = document.getElementById('orientationHint');
            if (isMobile && isPortrait && gameState.playing) {
                hint.classList.add('show');
            } else {
                hint.classList.remove('show');
            }
            
            return currentOrientation;
        }
        
        if (isMobile) {
            document.body.classList.add('mobile');
            detectOrientation();
        }
        
        window.addEventListener('resize', detectOrientation);
        window.addEventListener('orientationchange', detectOrientation);
        
        // Touch Controls State
        const touchState = {
            joystick: {
                active: false,
                startX: 0,
                startY: 0,
                currentX: 0,
                currentY: 0,
                deltaX: 0,
                deltaY: 0
            },
            firing: false
        };
        
        // Game State
        const gameState = {
            playing: false,
            score: 0,
            health: 100,
            wave: 1,
            combo: 1,
            comboTimer: 0,
            kills: 0
        };
        
        // Input State
        const keys = {};
        const mouse = { x: 0, y: 0 };
        
        // Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0015, 50, 200);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('gameCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x4400ff, 0.3);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        const pointLight1 = new THREE.PointLight(0xff00ff, 1, 50);
        pointLight1.position.set(-10, 5, -10);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x00ffff, 1, 50);
        pointLight2.position.set(10, 5, -10);
        scene.add(pointLight2);
        
        // Player Ship
        function createPlayerShip() {
            const group = new THREE.Group();
            
            // Main body (elongated diamond)
            const bodyGeometry = new THREE.ConeGeometry(0.8, 3, 4);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.3,
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = Math.PI / 2;
            group.add(body);
            
            // Wings
            const wingGeometry = new THREE.BoxGeometry(3, 0.1, 1);
            const wingMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff00ff,
                emissive: 0xff00ff,
                emissiveIntensity: 0.2,
                flatShading: true
            });
            const wing = new THREE.Mesh(wingGeometry, wingMaterial);
            wing.position.z = -0.5;
            group.add(wing);
            
            // Cockpit
            const cockpitGeometry = new THREE.SphereGeometry(0.4, 6, 6);
            const cockpitMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffff00,
                emissive: 0xffff00,
                emissiveIntensity: 0.5,
                flatShading: true
            });
            const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
            cockpit.position.z = 0.3;
            group.add(cockpit);
            
            // Engine glow
            const engineGeometry = new THREE.CylinderGeometry(0.3, 0.2, 0.5, 6);
            const engineMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff,
                transparent: true,
                opacity: 0.8
            });
            const engine = new THREE.Mesh(engineGeometry, engineMaterial);
            engine.rotation.x = Math.PI / 2;
            engine.position.z = -1.5;
            group.add(engine);
            
            group.position.y = 2;
            return group;
        }
        
        const player = createPlayerShip();
        scene.add(player);
        
        // Enemy Ship
        function createEnemyShip() {
            const group = new THREE.Group();
            
            const bodyGeometry = new THREE.OctahedronGeometry(0.8, 0);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff0055,
                emissive: 0xff0055,
                emissiveIntensity: 0.3,
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            group.add(body);
            
            return group;
        }
        
        // Projectile
        function createProjectile(color = 0xffff00) {
            const geometry = new THREE.SphereGeometry(0.2, 8, 8);
            const material = new THREE.MeshBasicMaterial({ color });
            const projectile = new THREE.Mesh(geometry, material);
            
            // Add glow
            const glowGeometry = new THREE.SphereGeometry(0.4, 8, 8);
            const glowMaterial = new THREE.MeshBasicMaterial({ 
                color,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            projectile.add(glow);
            
            return projectile;
        }
        
        // Particle System
        function createExplosion(position, color = 0xff00ff) {
            const particleCount = 20;
            const particles = [];
            
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 4, 4);
                const material = new THREE.MeshBasicMaterial({ color });
                const particle = new THREE.Mesh(geometry, material);
                
                particle.position.copy(position);
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                particle.life = 1.0;
                
                scene.add(particle);
                particles.push(particle);
            }
            
            return particles;
        }
        
        // Star Field
        function createStarField() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 1000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = (Math.random() - 0.5) * 200;
                positions[i + 2] = (Math.random() - 0.5) * 200 - 50;
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const starMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff,
                size: 0.3,
                transparent: true,
                opacity: 0.8
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            return stars;
        }
        
        const starField = createStarField();
        
        // Game Arrays
        const enemies = [];
        const projectiles = [];
        const particles = [];
        
        // Spawn Enemy
        function spawnEnemy() {
            const enemy = createEnemyShip();
            enemy.position.set(
                (Math.random() - 0.5) * 20,
                Math.random() * 10 + 2,
                -60
            );
            enemy.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.1,
                0,
                Math.random() * 0.2 + 0.3
            );
            enemy.health = 1;
            scene.add(enemy);
            enemies.push(enemy);
        }
        
        // Shoot Projectile
        let shootCooldown = 0;
        function shoot() {
            if (shootCooldown > 0) return;
            
            const projectile = createProjectile(0xffff00);
            projectile.position.copy(player.position);
            projectile.position.z -= 1;
            projectile.velocity = new THREE.Vector3(0, 0, -1);
            scene.add(projectile);
            projectiles.push(projectile);
            
            shootCooldown = 10;
            
            // Haptic feedback on mobile
            if (isMobile && window.vibrate) {
                window.vibrate(10);
            }
        }
        
        // Update HUD
        function updateHUD() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('combo').textContent = `×${gameState.combo}`;
            document.getElementById('wave').textContent = gameState.wave;
            
            const healthPercent = Math.max(0, gameState.health);
            const healthFill = document.getElementById('health-fill');
            healthFill.style.width = healthPercent + '%';
            
            if (healthPercent < 30) {
                healthFill.classList.add('low');
            } else {
                healthFill.classList.remove('low');
            }
        }
        
        // Screen Shake
        let shakeAmount = 0;
        function shake(amount) {
            shakeAmount = Math.max(shakeAmount, amount);
        }
        
        // Virtual Joystick
        function setupJoystick() {
            const joystickArea = document.querySelector('.joystick-area');
            const joystickStick = document.getElementById('joystickStick');
            const maxDistance = 45; // Max pixels from center
            
            function handleJoystickStart(e) {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const rect = joystickArea.getBoundingClientRect();
                touchState.joystick.active = true;
                touchState.joystick.startX = rect.left + rect.width / 2;
                touchState.joystick.startY = rect.top + rect.height / 2;
            }
            
            function handleJoystickMove(e) {
                if (!touchState.joystick.active) return;
                e.preventDefault();
                
                const touch = e.touches ? e.touches[0] : e;
                const deltaX = touch.clientX - touchState.joystick.startX;
                const deltaY = touch.clientY - touchState.joystick.startY;
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const limitedDistance = Math.min(distance, maxDistance);
                const angle = Math.atan2(deltaY, deltaX);
                
                const limitedX = Math.cos(angle) * limitedDistance;
                const limitedY = Math.sin(angle) * limitedDistance;
                
                touchState.joystick.currentX = limitedX;
                touchState.joystick.currentY = limitedY;
                touchState.joystick.deltaX = limitedX / maxDistance;
                touchState.joystick.deltaY = limitedY / maxDistance;
                
                joystickStick.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
            }
            
            function handleJoystickEnd(e) {
                e.preventDefault();
                touchState.joystick.active = false;
                touchState.joystick.deltaX = 0;
                touchState.joystick.deltaY = 0;
                joystickStick.style.transform = 'translate(-50%, -50%)';
            }
            
            joystickArea.addEventListener('touchstart', handleJoystickStart, { passive: false });
            joystickArea.addEventListener('touchmove', handleJoystickMove, { passive: false });
            joystickArea.addEventListener('touchend', handleJoystickEnd, { passive: false });
            joystickArea.addEventListener('touchcancel', handleJoystickEnd, { passive: false });
            
            // Mouse support for testing
            joystickArea.addEventListener('mousedown', handleJoystickStart);
            document.addEventListener('mousemove', handleJoystickMove);
            document.addEventListener('mouseup', handleJoystickEnd);
        }
        
        // Fire Button
        function setupFireButton() {
            const fireButton = document.getElementById('fireButton');
            
            function startFiring(e) {
                e.preventDefault();
                touchState.firing = true;
            }
            
            function stopFiring(e) {
                e.preventDefault();
                touchState.firing = false;
            }
            
            fireButton.addEventListener('touchstart', startFiring, { passive: false });
            fireButton.addEventListener('touchend', stopFiring, { passive: false });
            fireButton.addEventListener('touchcancel', stopFiring, { passive: false });
            
            // Mouse support
            fireButton.addEventListener('mousedown', startFiring);
            fireButton.addEventListener('mouseup', stopFiring);
        }
        
        if (isMobile) {
            setupJoystick();
            setupFireButton();
            
            // Prevent pull-to-refresh and scrolling
            document.body.addEventListener('touchmove', (e) => {
                if (gameState.playing) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            // Haptic feedback simulation
            window.vibrate = window.vibrate || window.webkitVibrate || window.mozVibrate || window.msVibrate;
        }
        
        // Screen Shake
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 60;
        
        function gameLoop() {
            if (!gameState.playing) return;
            
            // Player Movement - Handle both keyboard and touch
            const moveSpeed = 0.3;
            let moveX = 0;
            let moveY = 0;
            
            // Keyboard input
            if (keys['w'] || keys['ArrowUp']) moveY += 1;
            if (keys['s'] || keys['ArrowDown']) moveY -= 1;
            if (keys['a'] || keys['ArrowLeft']) moveX -= 1;
            if (keys['d'] || keys['ArrowRight']) moveX += 1;
            
            // Touch input (joystick)
            if (touchState.joystick.active) {
                moveX += touchState.joystick.deltaX;
                moveY -= touchState.joystick.deltaY; // Invert Y for natural up/down
            }
            
            // Apply movement with bounds
            player.position.x = Math.max(-10, Math.min(10, player.position.x + moveX * moveSpeed));
            player.position.y = Math.max(1, Math.min(12, player.position.y + moveY * moveSpeed));
            
            // Slight tilt based on movement
            player.rotation.z = -moveX * 0.1;
            player.rotation.x = moveY * 0.05;
            
            // Shooting - Handle both keyboard and touch
            if (keys[' '] || touchState.firing) shoot();
            if (shootCooldown > 0) shootCooldown--;
            
            // Spawn Enemies
            enemySpawnTimer++;
            if (enemySpawnTimer > enemySpawnInterval) {
                const count = Math.min(Math.floor(gameState.wave / 2) + 1, 3);
                for (let i = 0; i < count; i++) {
                    spawnEnemy();
                }
                enemySpawnTimer = 0;
            }
            
            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.position.add(proj.velocity);
                
                // Remove if out of bounds
                if (proj.position.z < -70 || proj.position.z > 30) {
                    scene.remove(proj);
                    projectiles.splice(i, 1);
                }
            }
            
            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.position.add(enemy.velocity);
                enemy.rotation.y += 0.05;
                
                // Check collision with player
                const distToPlayer = enemy.position.distanceTo(player.position);
                if (distToPlayer < 2) {
                    gameState.health -= 10;
                    shake(0.5);
                    createExplosion(enemy.position, 0xff0055);
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                    updateHUD();
                    
                    // Strong haptic on hit
                    if (isMobile && window.vibrate) {
                        window.vibrate(50);
                    }
                    continue;
                }
                
                // Remove if past player
                if (enemy.position.z > 30) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                }
            }
            
            // Collision Detection
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = proj.position.distanceTo(enemy.position);
                    
                    if (dist < 1.2) {
                        // Hit!
                        enemy.health--;
                        
                        if (enemy.health <= 0) {
                            gameState.score += 100 * gameState.combo;
                            gameState.kills++;
                            gameState.combo = Math.min(gameState.combo + 1, 10);
                            gameState.comboTimer = 180; // 3 seconds
                            
                            createExplosion(enemy.position, 0x00ffff);
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            
                            // Light haptic on kill
                            if (isMobile && window.vibrate) {
                                window.vibrate(20);
                            }
                            
                            // Wave progression
                            if (gameState.kills % 10 === 0) {
                                gameState.wave++;
                            }
                        }
                        
                        scene.remove(proj);
                        projectiles.splice(i, 1);
                        shake(0.2);
                        updateHUD();
                        break;
                    }
                }
            }
            
            // Combo Timer
            if (gameState.comboTimer > 0) {
                gameState.comboTimer--;
            } else if (gameState.combo > 1) {
                gameState.combo = Math.max(1, gameState.combo - 1);
                updateHUD();
            }
            
            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.position.add(particle.velocity);
                particle.life -= 0.05;
                particle.material.opacity = particle.life;
                
                if (particle.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                }
            }
            
            // Star Field Parallax
            const starPositions = starField.geometry.attributes.position.array;
            for (let i = 2; i < starPositions.length; i += 3) {
                starPositions[i] += 0.5;
                if (starPositions[i] > 50) {
                    starPositions[i] = -100;
                }
            }
            starField.geometry.attributes.position.needsUpdate = true;
            
            // Camera Follow with Shake - Adaptive to orientation
            const targetX = player.position.x * 0.3;
            let targetY = player.position.y + 13;
            let targetZ = 20;
            
            // Adjust camera for portrait mode (pull back and up more)
            if (isMobile && currentOrientation === 'portrait') {
                targetY = player.position.y + 18;
                targetZ = 25;
            }
            
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            
            if (shakeAmount > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeAmount;
                camera.position.y += (Math.random() - 0.5) * shakeAmount;
                shakeAmount *= 0.9;
            }
            
            camera.lookAt(player.position);
            
            // Game Over
            if (gameState.health <= 0) {
                endGame();
            }
            
            renderer.render(scene, camera);
        }
        
        function startGame() {
            gameState.playing = true;
            gameState.score = 0;
            gameState.health = 100;
            gameState.wave = 1;
            gameState.combo = 1;
            gameState.kills = 0;
            
            // Clear everything
            enemies.forEach(e => scene.remove(e));
            enemies.length = 0;
            projectiles.forEach(p => scene.remove(p));
            projectiles.length = 0;
            particles.forEach(p => scene.remove(p));
            particles.length = 0;
            
            player.position.set(0, 2, 0);
            
            document.getElementById('title').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            
            // Show orientation hint if needed
            detectOrientation();
            
            updateHUD();
            animate();
        }
        
        function endGame() {
            gameState.playing = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function animate() {
            if (!gameState.playing) return;
            requestAnimationFrame(animate);
            gameLoop();
        }
        
        // Event Listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        document.getElementById('startBtn').addEventListener('click', () => {
            startGame();
            // Request pointer lock for desktop
            if (!isMobile) {
                document.body.requestPointerLock();
            }
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            startGame();
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Update instructions based on platform
        function updateInstructions() {
            const titleElement = document.getElementById('title');
            const instructions = titleElement.querySelectorAll('p');
            
            if (isMobile) {
                instructions[0].textContent = 'JOYSTICK TO MOVE • FIRE BUTTON TO SHOOT';
                instructions[1].textContent = currentOrientation === 'portrait' ? 
                    'ROTATE TO LANDSCAPE FOR BEST EXPERIENCE' : 
                    'TAP ENGAGE TO START';
            } else {
                instructions[0].textContent = 'WASD/ARROWS TO MOVE • SPACE TO FIRE';
                instructions[1].textContent = 'CLICK TO LOCK POINTER';
            }
        }
        
        updateInstructions();
        window.addEventListener('orientationchange', () => {
            setTimeout(updateInstructions, 100);
        });
        
        // Initial Render
        renderer.render(scene, camera);
    </script>
</body>
</html>
