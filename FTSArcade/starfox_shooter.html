<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VECTOR SQUADRON | Isometric Space Shooter</title>
    <!-- ── Primary Meta ─────────────────────────────────────────────────────── -->
    <meta name="description" content="Astrovulpis" />

    <!-- ── Open Graph (Facebook, Discord, iMessage, etc.) ────────────────────── -->
    <meta property="og:title" content="VECTOR SQUADRON">
    <meta property="og:description" content="Defend the neon realm in this high-octane arcade experience.">
    <meta property="og:url" content="https://mofrymatic.github.io/the-KitchenFTSArcade/starfox_shooter.html">
    <meta property="og:type" content="website">

    <meta property="og:image" content="https://mofrymatic.github.io/the-Kitchen/FTSArcade/starfox_preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght:400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --deep-space: #0a0015;
            --space-purple: #1a0033;
            --warning-red: #ff0055;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-space);
            overflow: hidden;
            cursor: crosshair;
            touch-action: none;
        }
        
        body.mobile {
            cursor: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, var(--space-purple) 0%, var(--deep-space) 100%);
        }
        
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            opacity: 0.6;
        }
        
        .hud-corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        #stats {
            position: absolute;
            top: 30px;
            left: 110px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .stat-line {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .stat-label {
            font-weight: 700;
            margin-right: 12px;
            min-width: 100px;
        }
        
        .stat-value {
            font-weight: 900;
            font-size: 24px;
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }
        
        #health-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: width 0.3s ease, background 0.3s ease;
        }
        
        #health-fill.low {
            background: linear-gradient(90deg, var(--warning-red), #ff6600);
            box-shadow: 0 0 20px var(--warning-red);
            animation: pulse-health 0.5s infinite;
        }
        
        @keyframes pulse-health {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        #title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            pointer-events: all;
        }
        
        #title h1 {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-magenta);
            margin-bottom: 30px;
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
            51% { opacity: 1; }
            52% { opacity: 0.98; }
        }
        
        #title p {
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--neon-magenta);
            margin-bottom: 10px;
        }
        
        #startBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--neon-magenta);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            display: none;
            pointer-events: all;
        }
        
        #gameOver h2 {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 0 30px var(--warning-red);
            color: var(--warning-red);
            margin-bottom: 20px;
        }
        
        #gameOver .final-score {
            font-size: 32px;
            color: var(--neon-yellow);
            margin-bottom: 30px;
        }
        
        #restartBtn {
            padding: 12px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-yellow), var(--neon-magenta));
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 30px var(--neon-yellow);
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 3px
            );
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }
        
        /* Center reticle - shows forward firing direction */
        #centerReticle {
            position: fixed;
            width: 40px;
            height: 40px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 60;
            display: none;
            opacity: 0.4;
        }
        
        body.playing #centerReticle {
            display: block;
        }
        
        #centerReticle::before,
        #centerReticle::after {
            content: '';
            position: absolute;
            background: var(--neon-yellow);
            box-shadow: 0 0 8px var(--neon-yellow);
        }
        
        #centerReticle::before {
            width: 2px;
            height: 60%;
            left: 50%;
            top: 20%;
            transform: translateX(-50%);
        }
        
        #centerReticle::after {
            height: 2px;
            width: 60%;
            top: 50%;
            left: 20%;
            transform: translateY(-50%);
        }
        
        .reticle-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon-yellow);
            border-radius: 50%;
            opacity: 0.6;
            animation: pulse-reticle 2s infinite;
        }
        
        @keyframes pulse-reticle {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* Mobile adaptations */
        body.mobile.portrait .hud-corner {
            display: none;
        }
        
        body.mobile.portrait #stats {
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        body.mobile.portrait .stat-line {
            justify-content: center;
        }
        
        body.mobile.portrait #health-bar {
            width: 80%;
            max-width: 350px;
            bottom: auto;
            top: 20px;
        }
        
        body.mobile.portrait #title h1 {
            font-size: 48px;
        }
        
        body.mobile.portrait #title p {
            font-size: 14px;
        }
        
        body.mobile.landscape #stats {
            top: 20px;
            left: 20px;
            font-size: 14px;
        }
        
        body.mobile.landscape .stat-line {
            margin-bottom: 4px;
        }
        
        body.mobile.landscape .stat-value {
            font-size: 18px;
        }
        
        body.mobile.landscape #health-bar {
            width: 300px;
            height: 20px;
            bottom: 20px;
        }
        
        body.mobile.landscape .hud-corner {
            width: 50px;
            height: 50px;
        }
        
        /* Orientation hint */
        .orientation-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            z-index: 200;
            display: none;
        }
        
        .orientation-hint.show {
            display: block;
            animation: pulse-hint 1s infinite;
        }
        
        @keyframes pulse-hint {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .orientation-hint svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            stroke: var(--neon-cyan);
            fill: none;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="scanlines"></div>
    
    <!-- Center Reticle - Shows forward firing direction -->
    <div id="centerReticle">
        <div class="reticle-ring"></div>
    </div>
    
    <!-- Orientation Hint -->
    <div class="orientation-hint" id="orientationHint">
        <svg viewBox="0 0 100 100">
            <rect x="20" y="35" width="60" height="30" rx="5"/>
            <path d="M 50 35 L 50 20 M 45 25 L 50 20 L 55 25"/>
        </svg>
        <div style="font-size: 16px; letter-spacing: 2px;">ROTATE TO LANDSCAPE</div>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">FOR OPTIMAL EXPERIENCE</div>
    </div>
    
    <div id="hud">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
        
        <div id="stats">
            <div class="stat-line">
                <span class="stat-label">SCORE</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">COMBO</span>
                <span class="stat-value" id="combo">×1</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">WAVE</span>
                <span class="stat-value" id="wave">1</span>
            </div>
        </div>
        
        <div id="health-bar">
            <div id="health-fill" style="width: 100%;"></div>
        </div>
        
        <div id="title">
            <h1>VECTOR SQUADRON</h1>
            <p id="controlsText">POSITION SHIP TO AIM • CLICK TO FIRE</p>
            <button id="startBtn">ENGAGE</button>
        </div>
        
        <div id="gameOver">
            <h2>MISSION FAILED</h2>
            <div class="final-score">FINAL SCORE: <span id="finalScore">0</span></div>
            <button id="restartBtn">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Mobile Detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                        ('ontouchstart' in window);
        
        let currentOrientation = 'landscape';
        
        function detectOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            currentOrientation = isPortrait ? 'portrait' : 'landscape';
            
            document.body.classList.remove('portrait', 'landscape');
            document.body.classList.add(currentOrientation);
            
            const hint = document.getElementById('orientationHint');
            if (isMobile && isPortrait && gameState.playing) {
                hint.classList.add('show');
            } else {
                hint.classList.remove('show');
            }
        }
        
        if (isMobile) {
            document.body.classList.add('mobile');
            detectOrientation();
            document.getElementById('controlsText').textContent = 'TOUCH TO POSITION • HOLD TO FIRE';
        }
        
        window.addEventListener('resize', detectOrientation);
        window.addEventListener('orientationchange', detectOrientation);
        
        // Input State - Direct Position Control
        const input = {
            screenX: window.innerWidth / 2,
            screenY: window.innerHeight / 2,
            normalizedX: 0,
            normalizedY: 0,
            active: false,
            firing: false
        };
        
        // Game State
        const gameState = {
            playing: false,
            score: 0,
            health: 100,
            wave: 1,
            combo: 1,
            comboTimer: 0,
            kills: 0
        };
        
        // Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0015, 50, 200);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('gameCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x4400ff, 0.3);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        const pointLight1 = new THREE.PointLight(0xff00ff, 1, 50);
        pointLight1.position.set(-10, 5, -10);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x00ffff, 1, 50);
        pointLight2.position.set(10, 5, -10);
        scene.add(pointLight2);
        
        // Player Ship
        function createPlayerShip() {
            const group = new THREE.Group();
            
            const bodyGeometry = new THREE.ConeGeometry(0.8, 3, 4);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.3,
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = Math.PI / 2;
            group.add(body);
            
            const wingGeometry = new THREE.BoxGeometry(3, 0.1, 1);
            const wingMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff00ff,
                emissive: 0xff00ff,
                emissiveIntensity: 0.2,
                flatShading: true
            });
            const wing = new THREE.Mesh(wingGeometry, wingMaterial);
            wing.position.z = -0.5;
            group.add(wing);
            
            const cockpitGeometry = new THREE.SphereGeometry(0.4, 6, 6);
            const cockpitMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffff00,
                emissive: 0xffff00,
                emissiveIntensity: 0.5,
                flatShading: true
            });
            const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
            cockpit.position.z = 0.3;
            group.add(cockpit);
            
            const engineGeometry = new THREE.CylinderGeometry(0.3, 0.2, 0.5, 6);
            const engineMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff,
                transparent: true,
                opacity: 0.8
            });
            const engine = new THREE.Mesh(engineGeometry, engineMaterial);
            engine.rotation.x = Math.PI / 2;
            engine.position.z = -1.5;
            group.add(engine);
            
            group.position.y = 2;
            return group;
        }
        
        const player = createPlayerShip();
        scene.add(player);
        
        // Enemy Ship
        function createEnemyShip() {
            const group = new THREE.Group();
            
            const bodyGeometry = new THREE.OctahedronGeometry(0.8, 0);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff0055,
                emissive: 0xff0055,
                emissiveIntensity: 0.3,
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            group.add(body);
            
            return group;
        }
        
        // Projectile
        function createProjectile(color = 0xffff00) {
            const geometry = new THREE.SphereGeometry(0.2, 8, 8);
            const material = new THREE.MeshBasicMaterial({ color });
            const projectile = new THREE.Mesh(geometry, material);
            
            const glowGeometry = new THREE.SphereGeometry(0.4, 8, 8);
            const glowMaterial = new THREE.MeshBasicMaterial({ 
                color,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            projectile.add(glow);
            
            return projectile;
        }
        
        // Particle System
        function createExplosion(position, color = 0xff00ff) {
            const particleCount = 20;
            const particles = [];
            
            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 4, 4);
                const material = new THREE.MeshBasicMaterial({ color });
                const particle = new THREE.Mesh(geometry, material);
                
                particle.position.copy(position);
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                particle.life = 1.0;
                
                scene.add(particle);
                particles.push(particle);
            }
            
            return particles;
        }
        
        // Star Field
        function createStarField() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 1000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = (Math.random() - 0.5) * 200;
                positions[i + 2] = (Math.random() - 0.5) * 200 - 50;
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const starMaterial = new THREE.PointsMaterial({ 
                color: 0xffffff,
                size: 0.3,
                transparent: true,
                opacity: 0.8
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            return stars;
        }
        
        const starField = createStarField();
        
        // Game Arrays
        const enemies = [];
        const projectiles = [];
        const particles = [];
        
        // Spawn Enemy
        function spawnEnemy() {
            const enemy = createEnemyShip();
            enemy.position.set(
                (Math.random() - 0.5) * 20,
                Math.random() * 10 + 2,
                -60
            );
            enemy.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.1,
                0,
                Math.random() * 0.2 + 0.3
            );
            enemy.health = 1;
            scene.add(enemy);
            enemies.push(enemy);
        }
        
        // Shoot Projectile
        let shootCooldown = 0;
        function shoot() {
            if (shootCooldown > 0) return;
            
            const projectile = createProjectile(0xffff00);
            projectile.position.copy(player.position);
            projectile.position.z -= 1;
            projectile.velocity = new THREE.Vector3(0, 0, -1);
            scene.add(projectile);
            projectiles.push(projectile);
            
            shootCooldown = 10;
            
            if (isMobile && window.vibrate) {
                window.vibrate(10);
            }
        }
        
        // Update HUD
        function updateHUD() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('combo').textContent = `×${gameState.combo}`;
            document.getElementById('wave').textContent = gameState.wave;
            
            const healthPercent = Math.max(0, gameState.health);
            const healthFill = document.getElementById('health-fill');
            healthFill.style.width = healthPercent + '%';
            
            if (healthPercent < 30) {
                healthFill.classList.add('low');
            } else {
                healthFill.classList.remove('low');
            }
        }
        
        // Screen Shake
        let shakeAmount = 0;
        function shake(amount) {
            shakeAmount = Math.max(shakeAmount, amount);
        }
        
        // Input Handlers
        function updateInput(clientX, clientY) {
            input.screenX = clientX;
            input.screenY = clientY;
            
            // Convert screen coordinates to normalized space (-1 to 1)
            input.normalizedX = (clientX / window.innerWidth) * 2 - 1;
            input.normalizedY = -((clientY / window.innerHeight) * 2 - 1);
        }
        
        // Mouse Events
        document.addEventListener('mousemove', (e) => {
            if (!gameState.playing) return;
            input.active = true;
            updateInput(e.clientX, e.clientY);
        });
        
        document.addEventListener('mousedown', (e) => {
            if (!gameState.playing) return;
            input.firing = true;
        });
        
        document.addEventListener('mouseup', (e) => {
            input.firing = false;
        });
        
        // Touch Events
        document.addEventListener('touchstart', (e) => {
            if (!gameState.playing) return;
            e.preventDefault();
            input.active = true;
            input.firing = true;
            const touch = e.touches[0];
            updateInput(touch.clientX, touch.clientY);
        }, { passive: false });
        
        document.addEventListener('touchmove', (e) => {
            if (!gameState.playing) return;
            e.preventDefault();
            const touch = e.touches[0];
            updateInput(touch.clientX, touch.clientY);
        }, { passive: false });
        
        document.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                input.firing = false;
                input.active = false;
            }
        }, { passive: false });
        
        // Game Loop
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 60;
        
        function gameLoop() {
            if (!gameState.playing) return;
            
            // Direct Position Control - Ship follows cursor/touch
            if (input.active) {
                // Map normalized input to game space
                const targetX = input.normalizedX * 10;
                const targetY = input.normalizedY * 5.5 + 6.5;
                
                // Smooth lerp to target
                const smoothing = 0.15;
                player.position.x += (targetX - player.position.x) * smoothing;
                player.position.y += (targetY - player.position.y) * smoothing;
                
                // Clamp to bounds
                player.position.x = Math.max(-10, Math.min(10, player.position.x));
                player.position.y = Math.max(1, Math.min(12, player.position.y));
                
                // Ship tilts toward movement direction
                const deltaX = targetX - player.position.x;
                const deltaY = targetY - player.position.y;
                player.rotation.z = -deltaX * 0.15;
                player.rotation.x = deltaY * 0.1;
            }
            
            // Shooting
            if (input.firing) shoot();
            if (shootCooldown > 0) shootCooldown--;
            
            // Spawn Enemies
            enemySpawnTimer++;
            if (enemySpawnTimer > enemySpawnInterval) {
                const count = Math.min(Math.floor(gameState.wave / 2) + 1, 3);
                for (let i = 0; i < count; i++) {
                    spawnEnemy();
                }
                enemySpawnTimer = 0;
            }
            
            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.position.add(proj.velocity);
                
                if (proj.position.z < -70 || proj.position.z > 30) {
                    scene.remove(proj);
                    projectiles.splice(i, 1);
                }
            }
            
            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.position.add(enemy.velocity);
                enemy.rotation.y += 0.05;
                
                const distToPlayer = enemy.position.distanceTo(player.position);
                if (distToPlayer < 2) {
                    gameState.health -= 10;
                    shake(0.5);
                    createExplosion(enemy.position, 0xff0055);
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                    updateHUD();
                    
                    if (isMobile && window.vibrate) {
                        window.vibrate(50);
                    }
                    continue;
                }
                
                if (enemy.position.z > 30) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                }
            }
            
            // Collision Detection
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = proj.position.distanceTo(enemy.position);
                    
                    if (dist < 1.2) {
                        enemy.health--;
                        
                        if (enemy.health <= 0) {
                            gameState.score += 100 * gameState.combo;
                            gameState.kills++;
                            gameState.combo = Math.min(gameState.combo + 1, 10);
                            gameState.comboTimer = 180;
                            
                            createExplosion(enemy.position, 0x00ffff);
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            
                            if (isMobile && window.vibrate) {
                                window.vibrate(20);
                            }
                            
                            if (gameState.kills % 10 === 0) {
                                gameState.wave++;
                            }
                        }
                        
                        scene.remove(proj);
                        projectiles.splice(i, 1);
                        shake(0.2);
                        updateHUD();
                        break;
                    }
                }
            }
            
            // Combo Timer
            if (gameState.comboTimer > 0) {
                gameState.comboTimer--;
            } else if (gameState.combo > 1) {
                gameState.combo = Math.max(1, gameState.combo - 1);
                updateHUD();
            }
            
            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.position.add(particle.velocity);
                particle.life -= 0.05;
                particle.material.opacity = particle.life;
                
                if (particle.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                }
            }
            
            // Star Field Parallax
            const starPositions = starField.geometry.attributes.position.array;
            for (let i = 2; i < starPositions.length; i += 3) {
                starPositions[i] += 0.5;
                if (starPositions[i] > 50) {
                    starPositions[i] = -100;
                }
            }
            starField.geometry.attributes.position.needsUpdate = true;
            
            // Camera Follow with Shake
            const targetX = player.position.x * 0.3;
            let targetY = player.position.y + 13;
            let targetZ = 20;
            
            if (isMobile && currentOrientation === 'portrait') {
                targetY = player.position.y + 18;
                targetZ = 25;
            }
            
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            
            if (shakeAmount > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeAmount;
                camera.position.y += (Math.random() - 0.5) * shakeAmount;
                shakeAmount *= 0.9;
            }
            
            camera.lookAt(player.position);
            
            // Game Over
            if (gameState.health <= 0) {
                endGame();
            }
            
            renderer.render(scene, camera);
        }
        
        function startGame() {
            gameState.playing = true;
            gameState.score = 0;
            gameState.health = 100;
            gameState.wave = 1;
            gameState.combo = 1;
            gameState.kills = 0;
            
            enemies.forEach(e => scene.remove(e));
            enemies.length = 0;
            projectiles.forEach(p => scene.remove(p));
            projectiles.length = 0;
            particles.forEach(p => scene.remove(p));
            particles.length = 0;
            
            player.position.set(0, 2, 0);
            
            // Initialize input to center of screen
            input.screenX = window.innerWidth / 2;
            input.screenY = window.innerHeight / 2;
            input.normalizedX = 0;
            input.normalizedY = 0;
            input.active = !isMobile; // Auto-active on desktop
            
            document.getElementById('title').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.body.classList.add('playing');
            
            detectOrientation();
            updateHUD();
            animate();
        }
        
        function endGame() {
            gameState.playing = false;
            document.body.classList.remove('playing');
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function animate() {
            if (!gameState.playing) return;
            requestAnimationFrame(animate);
            gameLoop();
        }
        
        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Initial Render
        renderer.render(scene, camera);
    </script>
</body>
</html>
