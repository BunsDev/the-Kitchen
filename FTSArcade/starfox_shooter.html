<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VECTOR SQUADRON | FORGED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght:400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --deep-space: #0a0015;
            --space-purple: #1a0033;
            --warning-red: #ff0055;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-space);
            overflow: hidden;
            cursor: crosshair;
            touch-action: none;
        }
        
        body.mobile {
            cursor: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, var(--space-purple) 0%, var(--deep-space) 100%);
        }
        
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            opacity: 0.6;
        }
        
        .hud-corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        /* Reticle HUD */
        #reticle {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }
        
        #reticle::before,
        #reticle::after {
            content: '';
            position: absolute;
            background: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }
        
        #reticle::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        #reticle::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-50%);
        }
        
        #reticle .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon-magenta);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }
        
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }
        
        #stats {
            position: absolute;
            top: 30px;
            left: 110px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .stat-line {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .stat-label {
            font-weight: 700;
            margin-right: 12px;
            min-width: 100px;
        }
        
        .stat-value {
            font-weight: 900;
            font-size: 24px;
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }
        
        #speedMeter {
            position: absolute;
            top: 30px;
            right: 110px;
            font-family: 'Orbitron', monospace;
            text-align: right;
        }
        
        .speed-label {
            font-size: 14px;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        
        .speed-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--neon-magenta);
            text-shadow: 0 0 20px var(--neon-magenta);
            letter-spacing: 3px;
        }
        
        .speed-bar {
            width: 200px;
            height: 8px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid var(--neon-cyan);
            margin-top: 8px;
            overflow: hidden;
        }
        
        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow));
            box-shadow: 0 0 15px var(--neon-magenta);
            transition: width 0.1s ease;
        }
        
        #health-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: width 0.3s ease, background 0.3s ease;
        }
        
        #health-fill.low {
            background: linear-gradient(90deg, var(--warning-red), #ff6600);
            box-shadow: 0 0 20px var(--warning-red);
            animation: pulse-health 0.5s infinite;
        }
        
        @keyframes pulse-health {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        #title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            pointer-events: all;
        }
        
        #title h1 {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-magenta);
            margin-bottom: 30px;
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
            51% { opacity: 1; }
            52% { opacity: 0.98; }
        }
        
        #title p {
            font-size: 18px;
            letter-spacing: 3px;
            color: var(--neon-magenta);
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        #startBtn {
            margin-top: 30px;
            padding: 15px 50px;
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border: none;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--neon-magenta);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            display: none;
            pointer-events: all;
        }
        
        #gameOver h2 {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 0 30px var(--warning-red);
            color: var(--warning-red);
            margin-bottom: 20px;
        }
        
        #gameOver p {
            font-size: 32px;
            color: var(--neon-yellow);
            margin-bottom: 30px;
        }
        
        #restartBtn {
            padding: 12px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--neon-magenta), var(--neon-cyan));
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px var(--neon-magenta);
        }
        
        #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--neon-cyan);
        }
        
        /* Mobile control indicators */
        .control-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: var(--neon-cyan);
            text-align: center;
            opacity: 0.7;
            pointer-events: none;
            display: none;
        }
        
        .mobile .control-hint {
            display: block;
        }
        
        .playing .control-hint {
            animation: fade-out 3s forwards;
        }
        
        @keyframes fade-out {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
        
        <div id="reticle">
            <div class="ring"></div>
        </div>
        
        <div id="stats">
            <div class="stat-line">
                <span class="stat-label">SCORE</span>
                <span class="stat-value" id="scoreValue">0</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">WAVE</span>
                <span class="stat-value" id="waveValue">1</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">COMBO</span>
                <span class="stat-value" id="comboValue">x1</span>
            </div>
        </div>
        
        <div id="speedMeter">
            <div class="speed-label">VELOCITY</div>
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-bar">
                <div class="speed-fill" id="speedFill"></div>
            </div>
        </div>
        
        <div id="health-bar">
            <div id="health-fill"></div>
        </div>
        
        <div class="control-hint">
            TOUCH TO AIM • TILT TO EVADE • TAP TO FIRE
        </div>
    </div>
    
    <div id="title">
        <h1>VECTOR SQUADRON</h1>
        <p>OPPOSING QUADRANT DYNAMIC CAMERA</p>
        <p>TRAJECTORY-BIASED FRAMING</p>
        <p>HIGH-FIDELITY HAPTIC MATRIX</p>
        <button id="startBtn">ENGAGE</button>
    </div>
    
    <div id="gameOver">
        <h2>MISSION FAILED</h2>
        <p>FINAL SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn">RETRY</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0015, 20, 100);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) document.body.classList.add('mobile');
        
        let currentOrientation = 'landscape';
        
        function detectOrientation() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            currentOrientation = height > width ? 'portrait' : 'landscape';
        }
        
        detectOrientation();
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CORE SYSTEMS: SHIP, RETICLE, CAMERA (DECOUPLED)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        // Player Ship (Physics Object)
        const shipGeometry = new THREE.ConeGeometry(0.8, 3, 4);
        const shipMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const player = new THREE.Mesh(shipGeometry, shipMaterial);
        player.rotation.x = Math.PI / 2;
        scene.add(player);
        
        // Reticle (Player Intent - drives camera framing)
        const reticle = {
            worldX: 0,
            worldY: 0,
            worldZ: -30,
            screenX: window.innerWidth / 2,
            screenY: window.innerHeight / 2,
            normalizedX: 0,  // -1 to 1
            normalizedY: 0   // -1 to 1
        };
        
        // Camera System (Cinematic Brain)
        const cameraSystem = {
            baseFov: 75,
            targetFov: 75,
            // Opposing Quadrant Offset Multipliers
            shipOffsetX: 0,  // Spring-driven screen-space offset
            shipOffsetY: 0,
            // Over-the-shoulder orbit angles
            orbitAngleH: 0,  // Horizontal orbit
            orbitAngleV: 0,  // Vertical orbit
            orbitDistance: 20,
            orbitHeight: 13,
            // Look-ahead priority
            lookAtX: 0,
            lookAtY: 0,
            lookAtZ: -30
        };
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // FLIGHT PHYSICS & SPRING SYSTEM
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        const flightPhysics = {
            velocity: new THREE.Vector3(),
            acceleration: new THREE.Vector3(),
            maxSpeed: 0.8,
            drag: 0.92,
            responsiveness: 0.15,
            boostFactor: 1.0,
            boostDecay: 0.95,
            currentSpeed: 0,
            // Spring physics constants
            springStiffness: 0.08,
            springDamping: 0.85
        };
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // HIGH-FIDELITY HAPTIC MATRIX
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        const haptics = {
            enabled: isMobile && 'vibrate' in navigator,
            
            // Primary Weapons Fire: Sharp & Light (10-15ms)
            fire() {
                if (!this.enabled) return;
                navigator.vibrate(12);
            },
            
            // Engine Boost: Rising Frequency (500ms ramp)
            boost() {
                if (!this.enabled) return;
                // Simulate rising frequency with pattern
                navigator.vibrate([30, 10, 40, 10, 50, 10, 60]);
            },
            
            // Airbrakes: Grinding/Stuttering (20ms ON, 20ms OFF)
            airbrake() {
                if (!this.enabled) return;
                navigator.vibrate([20, 20, 20, 20, 20, 20, 20]);
            },
            
            // Evasive Roll: Sweeping Wave (200ms swell)
            roll() {
                if (!this.enabled) return;
                navigator.vibrate([30, 5, 50, 5, 80, 5, 50, 5, 30]);
            },
            
            // Damage Taken: Heavy & Low (150-200ms)
            damage() {
                if (!this.enabled) return;
                navigator.vibrate(180);
            },
            
            // Low Health: Heartbeat Rhythm (1.0s interval)
            heartbeat() {
                if (!this.enabled) return;
                navigator.vibrate([80, 80, 80]);
            },
            
            // Continuous boost hum (call repeatedly while boosting)
            boostHum() {
                if (!this.enabled) return;
                navigator.vibrate(8);
            }
        };
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // INPUT SYSTEM: ADAPTIVE DESKTOP VS MOBILE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        const input = {
            // Desktop (Mouse + WASD)
            mouseX: window.innerWidth / 2,
            mouseY: window.innerHeight / 2,
            keys: {
                w: false,
                a: false,
                s: false,
                d: false
            },
            
            // Mobile (Relative Touch + Gyro)
            touchActive: false,
            touchStartX: 0,
            touchStartY: 0,
            touchDeltaX: 0,
            touchDeltaY: 0,
            
            // Gyroscope
            gyroAlpha: 0,
            gyroBeta: 0,
            gyroGamma: 0,
            gyroInitialized: false,
            gyroBaseGamma: 0,
            gyroBaseBeta: 0,
            
            // Universal
            firing: false,
            active: false
        };
        
        // Desktop: Mouse Movement (Laser Pointer)
        document.addEventListener('mousemove', (e) => {
            if (isMobile) return;
            input.mouseX = e.clientX;
            input.mouseY = e.clientY;
            input.active = true;
        });
        
        // Desktop: WASD (Kinetic Overrides)
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in input.keys) {
                if (!input.keys[key]) {
                    // Trigger haptic on key press
                    if (key === 'w') haptics.boost();
                    if (key === 's') haptics.airbrake();
                    if (key === 'a' || key === 'd') haptics.roll();
                }
                input.keys[key] = true;
            }
            if (e.code === 'Space') {
                input.firing = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in input.keys) {
                input.keys[key] = false;
            }
            if (e.code === 'Space') {
                input.firing = false;
            }
        });
        
        // Mobile: Relative Touch (Trackpad Mode)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isMobile) return;
            
            const touch = e.touches[0];
            input.touchActive = true;
            input.touchStartX = touch.clientX;
            input.touchStartY = touch.clientY;
            input.touchDeltaX = 0;
            input.touchDeltaY = 0;
            input.active = true;
            input.firing = true;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isMobile || !input.touchActive) return;
            
            const touch = e.touches[0];
            // Calculate delta from initial touch point (trackpad mode)
            input.touchDeltaX = touch.clientX - input.touchStartX;
            input.touchDeltaY = touch.clientY - input.touchStartY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            input.touchActive = false;
            input.firing = false;
        });
        
        // Mobile: Gyroscope (Tilt Controls)
        if (isMobile) {
            // Request permission for iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('startBtn').addEventListener('click', () => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                        })
                        .catch(console.error);
                }, { once: true });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }
        
        function handleOrientation(e) {
            if (!input.gyroInitialized) {
                input.gyroBaseGamma = e.gamma || 0;
                input.gyroBaseBeta = e.beta || 0;
                input.gyroInitialized = true;
            }
            
            input.gyroAlpha = e.alpha || 0;
            input.gyroBeta = (e.beta || 0) - input.gyroBaseBeta;
            input.gyroGamma = (e.gamma || 0) - input.gyroBaseGamma;
        }
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // GAME STATE & ENTITIES
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        const gameState = {
            playing: false,
            score: 0,
            health: 100,
            wave: 1,
            combo: 1,
            comboTimer: 0,
            kills: 0
        };
        
        const enemies = [];
        const projectiles = [];
        const particles = [];
        
        let enemySpawnTimer = 0;
        const enemySpawnInterval = 120;
        let shootCooldown = 0;
        let shakeAmount = 0;
        
        // Low health heartbeat timer
        let heartbeatTimer = 0;
        const heartbeatInterval = 60;
        
        // Boost hum timer
        let boostHumTimer = 0;
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // SCENE SETUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);
        
        // Star Field
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        
        for (let i = 0; i < starCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i + 1] = (Math.random() - 0.5) * 200;
            starPositions[i + 2] = Math.random() * -150 - 50;
            
            const colorChoice = Math.random();
            if (colorChoice < 0.33) {
                starColors[i] = 0;
                starColors[i + 1] = 1;
                starColors[i + 2] = 1;
            } else if (colorChoice < 0.66) {
                starColors[i] = 1;
                starColors[i + 1] = 0;
                starColors[i + 2] = 1;
            } else {
                starColors[i] = 1;
                starColors[i + 1] = 1;
                starColors[i + 2] = 0;
            }
        }
        
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        
        const starMaterial = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });
        
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // GAME FUNCTIONS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        function shoot() {
            if (shootCooldown > 0) return;
            
            const projectile = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            
            // Shoot toward reticle world position
            projectile.position.copy(player.position);
            
            const direction = new THREE.Vector3(
                reticle.worldX - player.position.x,
                reticle.worldY - player.position.y,
                reticle.worldZ - player.position.z
            ).normalize();
            
            projectile.velocity = direction.multiplyScalar(2);
            
            scene.add(projectile);
            projectiles.push(projectile);
            
            shootCooldown = 8;
            
            // High-fidelity haptic: Primary Weapons Fire
            haptics.fire();
        }
        
        function spawnEnemy() {
            const enemyGeometry = new THREE.OctahedronGeometry(1.2);
            const enemyMaterial = new THREE.MeshBasicMaterial({
                color: 0xff00ff,
                wireframe: true
            });
            const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
            
            enemy.position.set(
                (Math.random() - 0.5) * 40,
                (Math.random() - 0.5) * 30,
                -80
            );
            
            const targetX = player.position.x + (Math.random() - 0.5) * 10;
            const targetY = player.position.y + (Math.random() - 0.5) * 10;
            const direction = new THREE.Vector3(
                targetX - enemy.position.x,
                targetY - enemy.position.y,
                30 - enemy.position.z
            ).normalize();
            
            enemy.velocity = direction.multiplyScalar(0.3 + Math.random() * 0.2);
            enemy.health = 1 + Math.floor(gameState.wave / 3);
            
            scene.add(enemy);
            enemies.push(enemy);
        }
        
        function createExplosion(position, color) {
            for (let i = 0; i < 15; i++) {
                const particleGeometry = new THREE.SphereGeometry(0.15, 4, 4);
                const particleMaterial = new THREE.MeshBasicMaterial({ color, transparent: true });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                
                particle.position.copy(position);
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                particle.life = 1.0;
                
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function shake(amount) {
            shakeAmount = Math.max(shakeAmount, amount);
        }
        
        function updateHUD() {
            document.getElementById('scoreValue').textContent = gameState.score;
            document.getElementById('waveValue').textContent = gameState.wave;
            document.getElementById('comboValue').textContent = 'x' + gameState.combo;
            
            const speedPercent = Math.min(
                (flightPhysics.currentSpeed / (flightPhysics.maxSpeed * 2)) * 100,
                100
            );
            document.getElementById('speedValue').textContent = Math.floor(flightPhysics.currentSpeed * 100);
            document.getElementById('speedFill').style.width = speedPercent + '%';
            
            const healthPercent = Math.max(0, gameState.health);
            document.getElementById('health-fill').style.width = healthPercent + '%';
            
            if (gameState.health < 20) {
                document.getElementById('health-fill').classList.add('low');
            } else {
                document.getElementById('health-fill').classList.remove('low');
            }
            
            // Update reticle HUD position
            const reticleEl = document.getElementById('reticle');
            reticleEl.style.left = reticle.screenX + 'px';
            reticleEl.style.top = reticle.screenY + 'px';
            reticleEl.style.opacity = input.active ? '1' : '0.3';
        }
        
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // MAIN GAME LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        function gameLoop() {
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 1. UPDATE RETICLE POSITION (Player Intent)
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            
            if (isMobile) {
                // Mobile: Relative Touch (Trackpad Mode)
                if (input.touchActive) {
                    // Sensitivity scaling
                    const sensitivity = 0.8;
                    reticle.screenX += input.touchDeltaX * sensitivity;
                    reticle.screenY += input.touchDeltaY * sensitivity;
                    
                    // Reset deltas after applying
                    input.touchStartX += input.touchDeltaX;
                    input.touchStartY += input.touchDeltaY;
                    input.touchDeltaX = 0;
                    input.touchDeltaY = 0;
                }
            } else {
                // Desktop: Direct Mouse Tracking
                reticle.screenX = input.mouseX;
                reticle.screenY = input.mouseY;
            }
            
            // Clamp to screen bounds
            reticle.screenX = Math.max(0, Math.min(window.innerWidth, reticle.screenX));
            reticle.screenY = Math.max(0, Math.min(window.innerHeight, reticle.screenY));
            
            // Convert to normalized coordinates (-1 to 1)
            reticle.normalizedX = (reticle.screenX / window.innerWidth) * 2 - 1;
            reticle.normalizedY = -((reticle.screenY / window.innerHeight) * 2 - 1);
            
            // Project reticle to world space (fixed depth plane)
            const reticleDepth = -30;
            const fovRad = camera.fov * Math.PI / 180;
            const tanFov = Math.tan(fovRad / 2);
            const aspectRatio = window.innerWidth / window.innerHeight;
            
            reticle.worldX = reticle.normalizedX * tanFov * Math.abs(reticleDepth) * aspectRatio;
            reticle.worldY = reticle.normalizedY * tanFov * Math.abs(reticleDepth);
            reticle.worldZ = reticleDepth;
            
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 2. KINETIC OVERRIDES (WASD or Gyro)
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            
            let kinetic = { x: 0, y: 0, boost: 1.0 };
            
            if (isMobile) {
                // Mobile: Gyroscope Controls
                // Tilt left/right: Roll (A/D equivalent)
                kinetic.x = Math.max(-1, Math.min(1, input.gyroGamma / 30));
                
                // Tilt forward/back: Boost/Airbrake (W/S equivalent)
                const tiltForward = -input.gyroBeta / 30; // Negative beta = tilt forward
                if (tiltForward > 0.3) {
                    kinetic.boost = 1.0 + tiltForward * 1.5;
                    // Continuous boost hum
                    boostHumTimer++;
                    if (boostHumTimer > 5) {
                        haptics.boostHum();
                        boostHumTimer = 0;
                    }
                } else if (tiltForward < -0.3) {
                    kinetic.boost = 0.5;
                    // Airbrake effect handled in flight physics
                }
            } else {
                // Desktop: WASD
                if (input.keys.a) kinetic.x = -1.5;
                if (input.keys.d) kinetic.x = 1.5;
                if (input.keys.w) {
                    kinetic.boost = 2.0;
                    boostHumTimer++;
                    if (boostHumTimer > 5) {
                        haptics.boostHum();
                        boostHumTimer = 0;
                    }
                }
                if (input.keys.s) kinetic.boost = 0.5;
            }
            
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 3. FLIGHT PHYSICS (Ship Movement)
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            
            // Target position based on reticle (aiming drives ship position)
            const aimInfluence = 0.4;
            const targetX = reticle.worldX * aimInfluence + kinetic.x;
            const targetY = reticle.worldY * aimInfluence;
            
            // Acceleration toward target
            flightPhysics.acceleration.x = (targetX - player.position.x) * flightPhysics.responsiveness;
            flightPhysics.acceleration.y = (targetY - player.position.y) * flightPhysics.responsiveness;
            
            // Apply acceleration
            flightPhysics.velocity.add(flightPhysics.acceleration);
            
            // Speed limiting
            const speed = flightPhysics.velocity.length();
            if (speed > flightPhysics.maxSpeed * kinetic.boost) {
                flightPhysics.velocity.normalize().multiplyScalar(flightPhysics.maxSpeed * kinetic.boost);
            }
            
            // Apply velocity
            player.position.add(flightPhysics.velocity);
            
            // Drag
            flightPhysics.velocity.multiplyScalar(flightPhysics.drag);
            
            // Boost factor smoothing
            flightPhysics.boostFactor += (kinetic.boost - flightPhysics.boostFactor) * 0.1;
            
            // Ship tilt based on velocity
            player.rotation.z = -flightPhysics.velocity.x * 0.8;
            player.rotation.x = Math.PI / 2 + flightPhysics.velocity.y * 0.3;
            
            // Boundaries
            player.position.x = Math.max(-25, Math.min(25, player.position.x));
            player.position.y = Math.max(-15, Math.min(20, player.position.y));
            
            // FOV boost effect
            flightPhysics.targetFov = flightPhysics.baseFov + (flightPhysics.boostFactor - 1) * 15;
            if (Math.abs(camera.fov - flightPhysics.targetFov) > 0.1) {
                camera.fov += (flightPhysics.targetFov - camera.fov) * 0.12;
                camera.updateProjectionMatrix();
            }
            
            flightPhysics.currentSpeed = speed;
            
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 4. OPPOSING QUADRANT DYNAMIC CAMERA
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            
            // Target ship offset: INVERSE of reticle position
            // If reticle is bottom-left (-1, -1), ship should be top-right (+1, +1)
            const targetShipOffsetX = -reticle.normalizedX * 8;  // Screen-space offset
            const targetShipOffsetY = -reticle.normalizedY * 5;
            
            // Spring physics: smooth transition
            cameraSystem.shipOffsetX += (targetShipOffsetX - cameraSystem.shipOffsetX) * flightPhysics.springStiffness;
            cameraSystem.shipOffsetY += (targetShipOffsetY - cameraSystem.shipOffsetY) * flightPhysics.springStiffness;
            cameraSystem.shipOffsetX *= flightPhysics.springDamping;
            cameraSystem.shipOffsetY *= flightPhysics.springDamping;
            
            // Over-the-shoulder orbit: camera orbits OPPOSITE to reticle direction
            const targetOrbitH = reticle.normalizedX * 0.3;  // Horizontal orbit angle
            const targetOrbitV = reticle.normalizedY * 0.2;  // Vertical orbit angle
            
            cameraSystem.orbitAngleH += (targetOrbitH - cameraSystem.orbitAngleH) * 0.08;
            cameraSystem.orbitAngleV += (targetOrbitV - cameraSystem.orbitAngleV) * 0.08;
            
            // Camera position: orbit around ship with dynamic offset
            const baseDistance = isMobile && currentOrientation === 'portrait' ? 25 : 20;
            const baseHeight = isMobile && currentOrientation === 'portrait' ? 18 : 13;
            
            const camX = player.position.x + cameraSystem.shipOffsetX + 
                        Math.sin(cameraSystem.orbitAngleH) * 3;
            const camY = player.position.y + baseHeight + cameraSystem.shipOffsetY +
                        Math.sin(cameraSystem.orbitAngleV) * 2;
            const camZ = baseDistance + Math.cos(cameraSystem.orbitAngleH) * 2;
            
            // Smooth camera movement
            camera.position.x += (camX - camera.position.x) * 0.1;
            camera.position.y += (camY - camera.position.y) * 0.1;
            camera.position.z += (camZ - camera.position.z) * 0.1;
            
            // Camera shake
            if (shakeAmount > 0) {
                camera.position.x += (Math.random() - 0.5) * shakeAmount;
                camera.position.y += (Math.random() - 0.5) * shakeAmount;
                shakeAmount *= 0.9;
            }
            
            // Look-ahead targeting: prioritize reticle over ship
            cameraSystem.lookAtX += (reticle.worldX - cameraSystem.lookAtX) * 0.12;
            cameraSystem.lookAtY += (reticle.worldY - cameraSystem.lookAtY) * 0.12;
            cameraSystem.lookAtZ += (reticle.worldZ - cameraSystem.lookAtZ) * 0.12;
            
            // Weight between ship and reticle
            const lookAtBlend = 0.3; // 30% ship, 70% reticle
            const finalLookAtX = player.position.x * lookAtBlend + cameraSystem.lookAtX * (1 - lookAtBlend);
            const finalLookAtY = player.position.y * lookAtBlend + cameraSystem.lookAtY * (1 - lookAtBlend);
            const finalLookAtZ = player.position.z * lookAtBlend + cameraSystem.lookAtZ * (1 - lookAtBlend);
            
            camera.lookAt(finalLookAtX, finalLookAtY, finalLookAtZ);
            
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            // 5. COMBAT & ENTITIES
            // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            
            // Shooting
            if (input.firing) shoot();
            if (shootCooldown > 0) shootCooldown--;
            
            // Spawn Enemies
            enemySpawnTimer++;
            if (enemySpawnTimer > enemySpawnInterval) {
                const count = Math.min(Math.floor(gameState.wave / 2) + 1, 3);
                for (let i = 0; i < count; i++) {
                    spawnEnemy();
                }
                enemySpawnTimer = 0;
            }
            
            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.position.add(proj.velocity);
                
                if (proj.position.z < -70 || proj.position.z > 30) {
                    scene.remove(proj);
                    projectiles.splice(i, 1);
                }
            }
            
            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.position.add(enemy.velocity);
                enemy.rotation.y += 0.05;
                
                const distToPlayer = enemy.position.distanceTo(player.position);
                if (distToPlayer < 2) {
                    gameState.health -= 10;
                    shake(0.5);
                    createExplosion(enemy.position, 0xff0055);
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                    
                    haptics.damage();
                    continue;
                }
                
                if (enemy.position.z > 30) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                    gameState.combo = 1;
                }
            }
            
            // Collision Detection
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = proj.position.distanceTo(enemy.position);
                    
                    if (dist < 1.2) {
                        enemy.health--;
                        
                        if (enemy.health <= 0) {
                            gameState.score += 100 * gameState.combo;
                            gameState.kills++;
                            gameState.combo = Math.min(gameState.combo + 1, 10);
                            gameState.comboTimer = 180;
                            
                            createExplosion(enemy.position, 0x00ffff);
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            
                            if (gameState.kills % 10 === 0) {
                                gameState.wave++;
                            }
                        }
                        
                        scene.remove(proj);
                        projectiles.splice(i, 1);
                        shake(0.2);
                        break;
                    }
                }
            }
            
            // Combo Timer
            if (gameState.comboTimer > 0) {
                gameState.comboTimer--;
            } else if (gameState.combo > 1) {
                gameState.combo = Math.max(1, gameState.combo - 1);
            }
            
            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.position.add(particle.velocity);
                particle.life -= 0.05;
                particle.material.opacity = particle.life;
                
                if (particle.life <= 0) {
                    scene.remove(particle);
                    particles.splice(i, 1);
                }
            }
            
            // Star Field Parallax
            const starPositions = starField.geometry.attributes.position.array;
            const currentWarpSpeed = 0.5 * flightPhysics.boostFactor;
            
            for (let i = 2; i < starPositions.length; i += 3) {
                starPositions[i] += currentWarpSpeed;
                if (starPositions[i] > 50) {
                    starPositions[i] = -100;
                }
            }
            starField.geometry.attributes.position.needsUpdate = true;
            
            // Low Health Heartbeat
            if (gameState.health < 20) {
                heartbeatTimer++;
                if (heartbeatTimer > heartbeatInterval) {
                    haptics.heartbeat();
                    heartbeatTimer = 0;
                }
            }
            
            // Update HUD
            updateHUD();
            
            // Game Over
            if (gameState.health <= 0) {
                endGame();
            }
            
            renderer.render(scene, camera);
        }
        
        function startGame() {
            gameState.playing = true;
            gameState.score = 0;
            gameState.health = 100;
            gameState.wave = 1;
            gameState.combo = 1;
            gameState.kills = 0;
            
            enemies.forEach(e => scene.remove(e));
            enemies.length = 0;
            projectiles.forEach(p => scene.remove(p));
            projectiles.length = 0;
            particles.forEach(p => scene.remove(p));
            particles.length = 0;
            
            player.position.set(0, 6.5, 0);
            flightPhysics.velocity.set(0, 0, 0);
            flightPhysics.boostFactor = 1.0;
            flightPhysics.targetFov = flightPhysics.baseFov;
            camera.fov = flightPhysics.baseFov;
            camera.updateProjectionMatrix();
            
            reticle.screenX = window.innerWidth / 2;
            reticle.screenY = window.innerHeight / 2;
            reticle.normalizedX = 0;
            reticle.normalizedY = 0;
            input.active = !isMobile;
            
            cameraSystem.shipOffsetX = 0;
            cameraSystem.shipOffsetY = 0;
            cameraSystem.orbitAngleH = 0;
            cameraSystem.orbitAngleV = 0;
            
            document.getElementById('title').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.body.classList.add('playing');
            
            detectOrientation();
            updateHUD();
            animate();
        }
        
        function endGame() {
            gameState.playing = false;
            document.body.classList.remove('playing');
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function animate() {
            if (!gameState.playing) return;
            requestAnimationFrame(animate);
            gameLoop();
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            detectOrientation();
        });
        
        renderer.render(scene, camera);
    </script>
</body>
</html>
