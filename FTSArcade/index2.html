<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazen FTS Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .cabinet-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .arcade-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .game-overlay {
            position: absolute;
            cursor: pointer;
            transition: background 0.2s;
        }

        .game-overlay:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Top row */
        .neon-invaders {
            left: 32%;
            top: 36%;
            width: 13%;
            height: 23%;
        }

        .asteroids {
            left: 46.5%;
            top: 36%;
            width: 13%;
            height: 23%;
        }

        .cave-racer {
            left: 61%;
            top: 36%;
            width: 13%;
            height: 23%;
        }

        /* Bottom row */
        .red-eye {
            left: 32%;
            top: 60%;
            width: 13%;
            height: 23%;
        }

        .pac-man {
            left: 46.5%;
            top: 60%;
            width: 13%;
            height: 23%;
        }

        .tetris {
            left: 61%;
            top: 60%;
            width: 13%;
            height: 23%;
        }
    </style>
</head>
<body>
    <div class="cabinet-wrapper">
        <img src="FishTacoStand.png" alt="Arcade Cabinet" class="arcade-image">
        
        <a href="https://www.free80sarcade.com/atari2600-spaceinvaders.php" target="_blank" 
           class="game-overlay neon-invaders" 
           aria-label="Play Neon Invaders"></a>
        
        <a href="https://freeasteroids.org/" target="_blank" 
           class="game-overlay asteroids" 
           aria-label="Play Asteroids"></a>
        
        <a href="https://www.crazygames.com/game/cave-racer" target="_blank" 
           class="game-overlay cave-racer" 
           aria-label="Play Cave Racer"></a>
        
        <a href="https://www.tripletsandus.com/80s/80s_games/redeye.htm" target="_blank" 
           class="game-overlay red-eye" 
           aria-label="Play Red Eye"></a>
        
        <a href="https://freepacman.org/" target="_blank" 
           class="game-overlay pac-man" 
           aria-label="Play Pac Man"></a>
        
        <a href="https://tetris.com/play-tetris" target="_blank" 
           class="game-overlay tetris" 
           aria-label="Play Tetris"></a>
    </div>
</body>
</html>
