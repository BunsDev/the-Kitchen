<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION CONTROL — PANEL Α</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --amber:    #ffb000;
    --amber-dim:#7a5300;
    --amber-lo: #2a1a00;
    --red:      #ff3c28;
    --red-dim:  #7a1a10;
    --green:    #39ff6e;
    --green-dim:#1a6630;
    --cyan:     #00e5ff;
    --cyan-dim: #004a55;
    --bg:       #040300;
    --panel:    #0a0800;
    --border:   #3a2800;
    --grid:     #1a1200;
    --text:     #ffb000;
    --text-dim: #7a5300;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 2px solid var(--amber);
    background: var(--panel);
    position: relative;
  }

  #header::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.4;
  }

  .hdr-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--amber), 0 0 40px rgba(255,176,0,0.3);
    animation: flicker 8s infinite;
  }

  .hdr-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .hdr-meta {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .hdr-stat {
    text-align: center;
  }

  .hdr-stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .hdr-stat-val {
    font-size: 14px;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 2px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green), 0 0 16px var(--green);
    animation: pulse 2s infinite;
  }

  .dot.alert { background: var(--red); box-shadow: 0 0 8px var(--red), 0 0 16px var(--red); animation: pulse-fast 0.5s infinite; }
  .dot.warn  { background: var(--amber); box-shadow: 0 0 8px var(--amber), 0 0 16px var(--amber); }

  /* ── MAIN GRID ──────────────────────────────────────── */
  #grid {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr;
    grid-template-rows: auto auto;
    gap: 0;
    height: calc(100vh - 65px);
  }

  .panel {
    border: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: #0d0a00;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  .panel-badge {
    font-size: 9px;
    padding: 1px 6px;
    border: 1px solid currentColor;
    letter-spacing: 1px;
  }

  .badge-ok    { color: var(--green); }
  .badge-warn  { color: var(--amber); }
  .badge-crit  { color: var(--red); animation: blink 1s step-end infinite; }

  .panel-body {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── TELEMETRY CHART (top-left, spans 2 rows in col 1) */
  #panel-main {
    grid-column: 1;
    grid-row: 1 / 3;
  }

  /* ── SYSTEM GAUGES (top-middle) */
  #panel-gauges {
    grid-column: 2;
    grid-row: 1;
  }

  /* ── ALERT FEED (top-right) */
  #panel-alerts {
    grid-column: 3;
    grid-row: 1;
  }

  /* ── DATA FEED (bottom-middle) */
  #panel-feed {
    grid-column: 2;
    grid-row: 2;
  }

  /* ── ACTION QUEUE (bottom-right) */
  #panel-actions {
    grid-column: 3;
    grid-row: 2;
  }

  /* ── CANVAS / CHART ─────────────────────────────────── */
  #mainCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── GAUGES ─────────────────────────────────────────── */
  .gauges-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    height: 100%;
    background: var(--border);
  }

  .gauge-cell {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
    gap: 4px;
  }

  .gauge-arc-wrap {
    position: relative;
    width: 80px; height: 50px;
    overflow: hidden;
  }

  .gauge-arc-wrap svg { position: absolute; top: 0; left: 0; }

  .gauge-val {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
  }

  .gauge-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align: center;
  }

  .gauge-sub {
    font-size: 9px;
    color: var(--text-dim);
  }

  /* ── ALERT FEED ─────────────────────────────────────── */
  .alert-list {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .alert-list::-webkit-scrollbar { display: none; }

  .alert-item {
    display: grid;
    grid-template-columns: 3px 1fr;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--grid);
    animation: slideIn 0.3s ease;
  }

  .alert-stripe {
    align-self: stretch;
    border-radius: 1px;
  }

  .alert-content {}

  .alert-time {
    font-size: 9px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .alert-msg {
    font-size: 11px;
    line-height: 1.4;
  }

  .alert-src {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .sev-crit .alert-stripe { background: var(--red); }
  .sev-crit .alert-msg    { color: var(--red); }
  .sev-warn .alert-stripe { background: var(--amber); }
  .sev-warn .alert-msg    { color: var(--amber); }
  .sev-info .alert-stripe { background: var(--cyan); }
  .sev-info .alert-msg    { color: var(--cyan); }
  .sev-ok   .alert-stripe { background: var(--green); }
  .sev-ok   .alert-msg    { color: var(--green); }

  /* ── DATA FEED ──────────────────────────────────────── */
  .feed-rows {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .feed-rows::-webkit-scrollbar { display: none; }

  .feed-row {
    display: grid;
    grid-template-columns: 70px 1fr 80px 50px;
    gap: 4px;
    align-items: center;
    padding: 5px 10px;
    border-bottom: 1px solid var(--grid);
    transition: background 0.2s;
  }

  .feed-row:hover { background: var(--grid); }

  .feed-row.updated { animation: flashRow 0.6s ease; }

  .feed-key   { color: var(--text-dim); font-size: 10px; }
  .feed-val   { font-size: 12px; font-family: 'Orbitron', monospace; font-weight: 700; }
  .feed-bar-wrap { height: 4px; background: var(--grid); }
  .feed-bar   { height: 100%; transition: width 0.5s ease; }
  .feed-delta { font-size: 10px; text-align: right; }
  .delta-up   { color: var(--green); }
  .delta-dn   { color: var(--red); }
  .delta-flat { color: var(--text-dim); }

  /* ── ACTION QUEUE ───────────────────────────────────── */
  .action-list {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .action-list::-webkit-scrollbar { display: none; }

  .action-item {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--grid);
    align-items: flex-start;
    cursor: pointer;
    transition: background 0.15s;
  }

  .action-item:hover { background: var(--grid); }

  .action-item.done { opacity: 0.35; }

  .action-checkbox {
    width: 14px; height: 14px;
    border: 1px solid var(--text-dim);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }

  .action-item.done .action-checkbox {
    border-color: var(--green);
    color: var(--green);
  }

  .action-body {}

  .action-title {
    font-size: 11px;
    line-height: 1.3;
  }

  .action-meta {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  .action-pri {
    font-size: 9px;
    padding: 0 4px;
    border: 1px solid currentColor;
  }

  .pri-1 { color: var(--red); }
  .pri-2 { color: var(--amber); }
  .pri-3 { color: var(--cyan); }

  /* ── MINI SPARKLINE ─────────────────────────────────── */
  .spark-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-bottom: 1px solid var(--grid);
  }

  .spark-label { font-size: 9px; color: var(--text-dim); width: 60px; letter-spacing: 1px; }
  .spark-canvas { flex: 1; height: 24px; }
  .spark-cur { font-family: 'Orbitron', monospace; font-size: 11px; width: 50px; text-align: right; }

  /* ── ANIMATIONS ─────────────────────────────────────── */
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes pulse-fast {
    0%,100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes flashRow {
    0%   { background: rgba(255,176,0,0.2); }
    100% { background: transparent; }
  }

  /* ── CLOCK ──────────────────────────────────────────── */
  #clock {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 10px var(--amber);
  }
</style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<div id="header">
  <div>
    <div class="hdr-title">MISSION CONTROL</div>
    <div class="hdr-sub">PANEL Α — TELEMETRY &amp; OPS</div>
  </div>

  <div class="hdr-meta">
    <div class="hdr-stat">
      <div class="hdr-stat-label">UPTIME</div>
      <div class="hdr-stat-val" id="uptime" style="color:var(--green)">00:00:00</div>
    </div>
    <div class="hdr-stat">
      <div class="hdr-stat-label">SESSION</div>
      <div class="hdr-stat-val" id="sessionId" style="color:var(--cyan)">----</div>
    </div>
    <div id="clock">00:00:00</div>
    <div class="hdr-stat">
      <div class="hdr-stat-label">NODE</div>
      <div class="hdr-stat-val">CTRL-01</div>
    </div>
    <div class="status-indicator">
      <div class="dot" id="statusDot"></div>
      <span id="statusLabel">NOMINAL</span>
    </div>
  </div>
</div>

<!-- ════════ MAIN GRID ════════ -->
<div id="grid">

  <!-- ╔══ TELEMETRY CHART ══╗ -->
  <div class="panel" id="panel-main">
    <div class="panel-header">
      <div class="panel-title">LIVE TELEMETRY — MULTI-STREAM</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:9px;color:var(--text-dim)" id="sampleCount">0 samples</span>
        <span class="panel-badge badge-ok">STREAMING</span>
      </div>
    </div>
    <!-- Sparklines row -->
    <div id="sparklines" style="flex-shrink:0;border-bottom:1px solid var(--border)">
      <!-- filled by JS -->
    </div>
    <div class="panel-body">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <!-- ╔══ SYSTEM GAUGES ══╗ -->
  <div class="panel" id="panel-gauges">
    <div class="panel-header">
      <div class="panel-title">SYSTEM VITALS</div>
      <span class="panel-badge badge-ok" id="gaugeStatus">OPTIMAL</span>
    </div>
    <div class="panel-body">
      <div class="gauges-grid" id="gaugesGrid">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <!-- ╔══ ALERT FEED ══╗ -->
  <div class="panel" id="panel-alerts">
    <div class="panel-header">
      <div class="panel-title">ALERT PIPELINE</div>
      <span class="panel-badge badge-warn" id="alertCount">0 ACTIVE</span>
    </div>
    <div class="panel-body">
      <div class="alert-list" id="alertList"></div>
    </div>
  </div>

  <!-- ╔══ DATA FEED ══╗ -->
  <div class="panel" id="panel-feed">
    <div class="panel-header">
      <div class="panel-title">DATA FEEDS</div>
      <span class="panel-badge badge-ok">LIVE</span>
    </div>
    <div class="panel-body">
      <div class="feed-rows" id="feedRows"></div>
    </div>
  </div>

  <!-- ╔══ ACTION QUEUE ══╗ -->
  <div class="panel" id="panel-actions">
    <div class="panel-header">
      <div class="panel-title">ACTION QUEUE</div>
      <span class="panel-badge badge-warn" id="actionCount">0 PENDING</span>
    </div>
    <div class="panel-body">
      <div class="action-list" id="actionList"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════
const STREAMS = [
  { id: 'alpha',   label: 'STREAM-α', color: '#ffb000', min: 20, max: 80,  val: 50, noise: 3 },
  { id: 'beta',    label: 'STREAM-β', color: '#00e5ff', min: 10, max: 60,  val: 35, noise: 5 },
  { id: 'gamma',   label: 'STREAM-γ', color: '#39ff6e', min: 0,  max: 100, val: 70, noise: 8 },
  { id: 'delta',   label: 'STREAM-δ', color: '#ff3c28', min: 30, max: 90,  val: 55, noise: 4 },
];

const GAUGES = [
  { id: 'cpu',  label: 'CPU',   unit: '%',   color: '#ffb000', val: 42, target: 80 },
  { id: 'mem',  label: 'MEM',   unit: '%',   color: '#00e5ff', val: 67, target: 90 },
  { id: 'net',  label: 'NET I/O',unit:'MB/s',color: '#39ff6e', val: 34, target: 100 },
  { id: 'disk', label: 'DISK',  unit: '%',   color: '#ff8c00', val: 55, target: 85 },
  { id: 'lat',  label: 'LATENCY',unit:'ms',  color: '#ff3c28', val: 12, target: 50  },
  { id: 'thr',  label: 'THRUPUT',unit:'k/s', color: '#b06fff', val: 88, target: 120 },
];

const FEEDS = [
  { key: 'ALPHA-RATE', val: 0, max: 1000, unit: '/s' },
  { key: 'BETA-RATE',  val: 0, max: 500,  unit: '/s' },
  { key: 'ERR-RATE',   val: 0, max: 100,  unit: '%'  },
  { key: 'QUEUE-DEPTH',val: 0, max: 2000, unit: ''   },
  { key: 'CACHE-HIT',  val: 0, max: 100,  unit: '%'  },
  { key: 'UPLINK-BW',  val: 0, max: 1000, unit: 'Mb' },
  { key: 'P99-LAT',    val: 0, max: 500,  unit: 'ms' },
  { key: 'ACTIVE-CONN',val: 0, max: 10000,unit: ''   },
];

const ACTIONS_INIT = [
  { id: 1, title: 'Verify failover routing to secondary cluster', pri: 1, owner: 'OPS-TEAM', ts: '-2m', done: false },
  { id: 2, title: 'Acknowledge latency spike on STREAM-δ', pri: 1, owner: 'NETENG', ts: '-5m', done: false },
  { id: 3, title: 'Rotate TLS certificates — 4 nodes', pri: 2, owner: 'SECOPS', ts: '-12m', done: false },
  { id: 4, title: 'Update capacity forecast for Q3', pri: 3, owner: 'ANALYST', ts: '-1h', done: false },
  { id: 5, title: 'Run post-mortem for INC-0447', pri: 2, owner: 'OPS-TEAM', ts: '-3h', done: true },
  { id: 6, title: 'Validate backup integrity checksum', pri: 2, owner: 'INFRA', ts: '-4h', done: false },
  { id: 7, title: 'Sync MRTG thresholds with SLA targets', pri: 3, owner: 'NOC', ts: '-6h', done: true },
];

const ALERT_POOL = [
  { sev:'crit', msg:'Heartbeat timeout on NODE-07', src:'WATCHDOG' },
  { sev:'warn', msg:'STREAM-δ jitter exceeds 40ms threshold', src:'TELEMETRY' },
  { sev:'info', msg:'Checkpoint completed — 4.2GB written', src:'STORAGE' },
  { sev:'crit', msg:'Memory pressure: 94% on CTRL-02', src:'SYSMON' },
  { sev:'ok',   msg:'Failover test completed successfully', src:'TESTRUNNER' },
  { sev:'warn', msg:'Queue depth approaching soft limit', src:'BROKER' },
  { sev:'info', msg:'Scheduled maintenance window in 2h', src:'SCHEDULER' },
  { sev:'warn', msg:'Certificate expiry in 7 days — NODE-03', src:'CERTMON' },
  { sev:'crit', msg:'Packet loss 3.2% on uplink UPL-001', src:'NETMON' },
  { sev:'ok',   msg:'Auto-scaling triggered — +2 instances', src:'AUTOSCALE' },
  { sev:'info', msg:'Nightly digest dispatched to OPS-TEAM', src:'NOTIFY' },
  { sev:'warn', msg:'CPU throttling detected — thermal limit', src:'HWMON' },
];

// History buffers
const HISTORY_LEN = 200;
STREAMS.forEach(s => { s.history = Array(HISTORY_LEN).fill(s.val); });

let alerts = [];
let actions = JSON.parse(JSON.stringify(ACTIONS_INIT));
let startTime = Date.now();
let sampleCount = 0;
let sessionId = Math.random().toString(36).slice(2,8).toUpperCase();

// ═══════════════════════════════════════════════════════
// CLOCK & UPTIME
// ═══════════════════════════════════════════════════════
function pad(n){ return String(n).padStart(2,'0'); }

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(elapsed/3600), m = Math.floor((elapsed%3600)/60), s = elapsed%60;
  document.getElementById('uptime').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

document.getElementById('sessionId').textContent = sessionId;

// ═══════════════════════════════════════════════════════
// SPARKLINES
// ═══════════════════════════════════════════════════════
function buildSparklines() {
  const wrap = document.getElementById('sparklines');
  wrap.innerHTML = '';
  STREAMS.forEach(s => {
    const row = document.createElement('div');
    row.className = 'spark-row';
    row.innerHTML = `
      <div class="spark-label">${s.label}</div>
      <canvas class="spark-canvas" id="spark-${s.id}"></canvas>
      <div class="spark-cur" id="spark-val-${s.id}" style="color:${s.color}">--</div>
    `;
    wrap.appendChild(row);
  });
}

function drawSparkline(s) {
  const canvas = document.getElementById('spark-'+s.id);
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = rect.width, h = rect.height;
  const data = s.history.slice(-80);
  const mn = Math.min(...data), mx = Math.max(...data);
  const range = mx - mn || 1;

  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = s.color;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - ((v - mn) / range) * h * 0.85 - h*0.075;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  document.getElementById('spark-val-'+s.id).textContent =
    s.history[s.history.length-1].toFixed(1);
}

// ═══════════════════════════════════════════════════════
// MAIN CANVAS — multi-stream chart
// ═══════════════════════════════════════════════════════
const mainCanvas = document.getElementById('mainCanvas');
const mctx = mainCanvas.getContext('2d');

function resizeCanvas() {
  const rect = mainCanvas.parentElement.getBoundingClientRect();
  mainCanvas.width  = rect.width  * devicePixelRatio;
  mainCanvas.height = rect.height * devicePixelRatio;
  mainCanvas.style.width  = rect.width  + 'px';
  mainCanvas.style.height = rect.height + 'px';
}

function drawMainChart() {
  resizeCanvas();
  const W = mainCanvas.width / devicePixelRatio;
  const H = mainCanvas.height / devicePixelRatio;
  const ctx = mctx;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  ctx.clearRect(0, 0, W, H);

  const PAD = { top: 20, right: 12, bottom: 30, left: 44 };
  const cw = W - PAD.left - PAD.right;
  const ch = H - PAD.top  - PAD.bottom;

  // Background grid
  ctx.strokeStyle = '#1a1200';
  ctx.lineWidth = 1;
  const gridCols = 10, gridRows = 8;
  for (let i = 0; i <= gridCols; i++) {
    const x = PAD.left + (i / gridCols) * cw;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + ch); ctx.stroke();
  }
  for (let i = 0; i <= gridRows; i++) {
    const y = PAD.top + (i / gridRows) * ch;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cw, y); ctx.stroke();
  }

  // Y axis labels
  ctx.fillStyle = '#7a5300';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridRows; i++) {
    const v = 100 - (i / gridRows) * 100;
    const y = PAD.top + (i / gridRows) * ch;
    ctx.fillText(v.toFixed(0), PAD.left - 4, y + 3);
  }

  // X axis (time ticks)
  ctx.fillStyle = '#7a5300';
  ctx.textAlign = 'center';
  ctx.font = '9px Share Tech Mono';
  for (let i = 0; i <= 5; i++) {
    const x = PAD.left + (i/5) * cw;
    ctx.fillText(`-${((5-i)*8).toFixed(0)}s`, x, PAD.top + ch + 18);
  }

  // Border
  ctx.strokeStyle = '#3a2800';
  ctx.lineWidth = 1;
  ctx.strokeRect(PAD.left, PAD.top, cw, ch);

  // Each stream
  STREAMS.forEach(s => {
    const data = s.history.slice(-HISTORY_LEN);
    const pts = data.length;

    // Fill area
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = PAD.left + (i / (pts - 1)) * cw;
      const y = PAD.top + ch - ((v - 0) / 100) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(PAD.left + cw, PAD.top + ch);
    ctx.lineTo(PAD.left, PAD.top + ch);
    ctx.closePath();
    ctx.fillStyle = s.color + '08';
    ctx.fill();

    // Line
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = PAD.left + (i / (pts - 1)) * cw;
      const y = PAD.top + ch - ((v - 0) / 100) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Current value dot
    const lastV = data[data.length - 1];
    const dotX = PAD.left + cw;
    const dotY = PAD.top + ch - ((lastV - 0) / 100) * ch;
    ctx.beginPath();
    ctx.arc(dotX, dotY, 3, 0, Math.PI*2);
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Legend
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'left';
  STREAMS.forEach((s, i) => {
    const x = PAD.left + 8 + i * (cw / STREAMS.length);
    const y = PAD.top + 12;
    ctx.fillStyle = s.color;
    ctx.fillRect(x, y - 6, 16, 2);
    ctx.fillStyle = s.color + 'cc';
    ctx.fillText(s.label, x + 20, y);
  });

  ctx.setTransform(1,0,0,1,0,0);
}

// ═══════════════════════════════════════════════════════
// GAUGES (arc/semicircle SVG)
// ═══════════════════════════════════════════════════════
function buildGauges() {
  const grid = document.getElementById('gaugesGrid');
  grid.innerHTML = '';
  GAUGES.forEach(g => {
    const cell = document.createElement('div');
    cell.className = 'gauge-cell';
    cell.id = 'gauge-cell-'+g.id;
    cell.innerHTML = `
      <div class="gauge-arc-wrap">
        <svg width="80" height="50" viewBox="0 0 80 50">
          <path d="M 8 46 A 32 32 0 0 1 72 46" fill="none" stroke="#1a1200" stroke-width="5" stroke-linecap="round"/>
          <path id="gauge-arc-${g.id}" d="M 8 46 A 32 32 0 0 1 72 46" fill="none" stroke="${g.color}" stroke-width="5" stroke-linecap="round"
                stroke-dasharray="100.5" stroke-dashoffset="100.5"/>
        </svg>
      </div>
      <div class="gauge-val" id="gauge-val-${g.id}" style="color:${g.color}">--</div>
      <div class="gauge-label">${g.label}</div>
      <div class="gauge-sub" id="gauge-sub-${g.id}" style="color:${g.color}88">/ ${g.target}${g.unit}</div>
    `;
    grid.appendChild(cell);
  });
}

function updateGauge(g) {
  const arc = document.getElementById('gauge-arc-'+g.id);
  const valEl = document.getElementById('gauge-val-'+g.id);
  if (!arc || !valEl) return;
  const pct = Math.min(g.val / g.target, 1);
  const totalLen = 100.5;
  arc.style.strokeDashoffset = totalLen - (totalLen * pct);
  valEl.textContent = g.val.toFixed(1) + g.unit;
}

// ═══════════════════════════════════════════════════════
// DATA FEED TABLE
// ═══════════════════════════════════════════════════════
function buildFeedRows() {
  const wrap = document.getElementById('feedRows');
  wrap.innerHTML = '';
  FEEDS.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'feed-row';
    row.id = 'feed-row-'+i;
    row.innerHTML = `
      <div class="feed-key">${f.key}</div>
      <div>
        <div class="feed-bar-wrap"><div class="feed-bar" id="feed-bar-${i}" style="background:#ffb000;width:0%"></div></div>
      </div>
      <div class="feed-val" id="feed-val-${i}">--</div>
      <div class="feed-delta" id="feed-delta-${i}">--</div>
    `;
    wrap.appendChild(row);
  });
}

function updateFeedRow(i) {
  const f = FEEDS[i];
  const row = document.getElementById('feed-row-'+i);
  const valEl = document.getElementById('feed-val-'+i);
  const barEl = document.getElementById('feed-bar-'+i);
  const deltaEl = document.getElementById('feed-delta-'+i);
  if (!row) return;
  const pct = Math.min(f.val / f.max * 100, 100);
  const barColor = pct > 85 ? '#ff3c28' : pct > 60 ? '#ffb000' : '#39ff6e';
  barEl.style.width = pct + '%';
  barEl.style.background = barColor;
  valEl.textContent = f.val.toFixed(f.unit === '%' || f.unit === 'ms' ? 1 : 0) + (f.unit || '');
  valEl.style.color = barColor;

  const delta = f._prev !== undefined ? f.val - f._prev : 0;
  if (Math.abs(delta) < 0.05) {
    deltaEl.textContent = '──';
    deltaEl.className = 'feed-delta delta-flat';
  } else if (delta > 0) {
    deltaEl.textContent = '▲' + Math.abs(delta).toFixed(1);
    deltaEl.className = 'feed-delta delta-up';
  } else {
    deltaEl.textContent = '▼' + Math.abs(delta).toFixed(1);
    deltaEl.className = 'feed-delta delta-dn';
  }

  if (delta !== 0) {
    row.classList.add('updated');
    setTimeout(() => row.classList.remove('updated'), 600);
  }
  f._prev = f.val;
}

// ═══════════════════════════════════════════════════════
// ALERT FEED
// ═══════════════════════════════════════════════════════
function pushAlert(a) {
  const now = new Date();
  const ts = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  alerts.unshift({ ...a, ts, id: Math.random() });
  if (alerts.length > 30) alerts.pop();
  renderAlerts();
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  list.innerHTML = '';
  alerts.forEach(a => {
    const item = document.createElement('div');
    item.className = `alert-item sev-${a.sev}`;
    item.innerHTML = `
      <div class="alert-stripe"></div>
      <div class="alert-content">
        <div class="alert-time">${a.ts}</div>
        <div class="alert-msg">${a.msg}</div>
        <div class="alert-src">SRC: ${a.src}</div>
      </div>
    `;
    list.appendChild(item);
  });
  const crits = alerts.filter(x => x.sev === 'crit').length;
  const warns = alerts.filter(x => x.sev === 'warn').length;
  const cnt = document.getElementById('alertCount');
  cnt.textContent = `${crits+warns} ACTIVE`;
  cnt.className = crits > 0 ? 'panel-badge badge-crit' : warns > 0 ? 'panel-badge badge-warn' : 'panel-badge badge-ok';

  // Status indicator
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  if (crits > 0) {
    dot.className = 'dot alert';
    lbl.textContent = 'CRITICAL';
    lbl.style.color = 'var(--red)';
  } else if (warns > 0) {
    dot.className = 'dot warn';
    lbl.textContent = 'WARNING';
    lbl.style.color = 'var(--amber)';
  } else {
    dot.className = 'dot';
    lbl.textContent = 'NOMINAL';
    lbl.style.color = 'var(--green)';
  }
}

// ═══════════════════════════════════════════════════════
// ACTION QUEUE
// ═══════════════════════════════════════════════════════
function renderActions() {
  const list = document.getElementById('actionList');
  list.innerHTML = '';
  actions.forEach(a => {
    const item = document.createElement('div');
    item.className = 'action-item' + (a.done ? ' done' : '');
    item.innerHTML = `
      <div class="action-checkbox">${a.done ? '✓' : ''}</div>
      <div class="action-body">
        <div class="action-title">${a.title}</div>
        <div class="action-meta">
          <span class="action-pri pri-${a.pri}">P${a.pri}</span>
          <span>${a.owner}</span>
          <span>${a.ts}</span>
        </div>
      </div>
    `;
    item.addEventListener('click', () => {
      a.done = !a.done;
      renderActions();
      updateActionCount();
    });
    list.appendChild(item);
  });
  updateActionCount();
}

function updateActionCount() {
  const pending = actions.filter(x => !x.done).length;
  const el = document.getElementById('actionCount');
  el.textContent = `${pending} PENDING`;
  el.className = pending > 3 ? 'panel-badge badge-warn' : pending > 0 ? 'panel-badge badge-ok' : 'panel-badge badge-ok';
}

// ═══════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════
function noise(val, min, max, amp) {
  return Math.max(min, Math.min(max, val + (Math.random() - 0.5) * amp * 2));
}

let tick = 0;
function simulate() {
  tick++;
  sampleCount++;

  // Update streams
  STREAMS.forEach(s => {
    s.val = noise(s.val, s.min, s.max, s.noise);
    s.history.push(s.val);
    if (s.history.length > HISTORY_LEN) s.history.shift();
  });

  // Update gauges
  GAUGES.forEach(g => {
    if (g.id === 'cpu')  g.val = noise(g.val, 5, 95, 5);
    else if (g.id === 'mem')  g.val = noise(g.val, 40, 95, 2);
    else if (g.id === 'net')  g.val = noise(g.val, 5, 95, 8);
    else if (g.id === 'disk') g.val = noise(g.val, 50, 80, 1);
    else if (g.id === 'lat')  g.val = noise(g.val, 2, 45, 4);
    else if (g.id === 'thr')  g.val = noise(g.val, 60, 110, 7);
    updateGauge(g);
  });

  // Gauge status badge
  const overLimit = GAUGES.filter(g => g.val / g.target > 0.85).length;
  const gsBadge = document.getElementById('gaugeStatus');
  gsBadge.textContent = overLimit > 2 ? 'DEGRADED' : overLimit > 0 ? 'WATCH' : 'OPTIMAL';
  gsBadge.className = overLimit > 2 ? 'panel-badge badge-crit' : overLimit > 0 ? 'panel-badge badge-warn' : 'panel-badge badge-ok';

  // Update feeds
  FEEDS[0].val = noise(FEEDS[0].val, 200, 900, 50);
  FEEDS[1].val = noise(FEEDS[1].val, 80,  480, 30);
  FEEDS[2].val = noise(FEEDS[2].val, 0,   15,  1.5);
  FEEDS[3].val = noise(FEEDS[3].val, 100, 1800, 100);
  FEEDS[4].val = noise(FEEDS[4].val, 70,  99,  3);
  FEEDS[5].val = noise(FEEDS[5].val, 200, 900, 60);
  FEEDS[6].val = noise(FEEDS[6].val, 5,   250, 20);
  FEEDS[7].val = noise(FEEDS[7].val, 500, 8000, 300);
  FEEDS.forEach((_, i) => updateFeedRow(i));

  // Random alerts
  if (tick % 40 === 0 || (tick < 5)) {
    const pool = ALERT_POOL;
    pushAlert(pool[Math.floor(Math.random() * pool.length)]);
  }

  document.getElementById('sampleCount').textContent = sampleCount.toLocaleString() + ' samples';
}

// ═══════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════
let lastSimTime = 0;
let lastDrawTime = 0;

function loop(ts) {
  if (ts - lastSimTime > 250) {
    simulate();
    lastSimTime = ts;
    updateClock();
  }
  if (ts - lastDrawTime > 33) {
    drawMainChart();
    STREAMS.forEach(drawSparkline);
    lastDrawTime = ts;
  }
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init() {
  buildSparklines();
  buildGauges();
  buildFeedRows();
  renderActions();
  renderAlerts();

  // Seed initial alerts
  pushAlert({ sev:'crit', msg:'NODE-07 offline — initiating recovery sequence', src:'WATCHDOG' });
  pushAlert({ sev:'warn', msg:'STREAM-δ elevated jitter — monitoring', src:'TELEMETRY' });
  pushAlert({ sev:'info', msg:'Panel Α initialized — all systems nominal', src:'SYSTEM' });

  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resizeCanvas(); });
window.addEventListener('load', init);
</script>
