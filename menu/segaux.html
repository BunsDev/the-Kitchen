<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>auxslop // Web Port</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0e12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: #e0e4eb;
            background: rgba(18, 20, 26, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            pointer-events: auto;
            max-width: 320px;
        }
        h1 {
            font-size: 1.25rem;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #ffffff;
        }
        .status-tag {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            background: #238636;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .metrics {
            font-family: monospace;
            font-size: 0.85rem;
            color: #a3b3cc;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <h1>auxslop</h1>
        <div class="status-tag">ThreeJS Engine Active</div>
        <div class="metrics">
            <p>Target: WebGL2 Canvas</p>
            <p>Frame System: RequestAnimationFrame</p>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
            <p id="fps-counter">FPS: --</p>
            <p id="objects-counter">Render Objects: 0</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // --- System Port State Organization ---
        class ApplicationState {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.clock = new THREE.Clock();
                
                // Analytics profiling
                this.lastTime = performance.now();
                this.frames = 0;
                this.fpsElement = document.getElementById('fps-counter');

                this.init();
            }

            init() {
                // 1. Scene Construction
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x0d0e12, 0.015);

                // 2. Camera Viewport Matrix Setup (Replacing GLM configuration)
                this.camera = new THREE.PerspectiveCamera(
                    60, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                this.camera.position.set(0, 5, 15);

                // 3. WebGL Renderer Context Instantiation
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                // 4. Camera Manipulation Matrix Controls
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;

                // 5. Environmental Lighting Pipeline
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
                this.scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);

                // 6. Native Geometry Core Testing (Mirroring Styles/Interface modules)
                this.buildDemoScene();

                // 7. Event Hooks
                window.addEventListener('resize', () => this.onWindowResize());

                // Run render system loop
                this.animate();
            }

            buildDemoScene() {
                // Test grid mapping layout
                const gridHelper = new THREE.GridHelper(40, 40, 0x4f5b66, 0x232830);
                gridHelper.position.y = -0.5;
                this.scene.add(gridHelper);

                // Placeholder architectural volume
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x4a90e2,
                    roughness: 0.2,
                    metalness: 0.1
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.name = "core_volume";
                this.scene.add(mesh);

                // Populate data tracker tracking UI
                document.getElementById('objects-counter').innerText = `Render Objects: ${this.scene.children.length}`;
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            trackMetrics() {
                this.frames++;
                const time = performance.now();
                if (time >= this.lastTime + 1000) {
                    this.fpsElement.innerText = `FPS: ${Math.round((this.frames * 1000) / (time - this.lastTime))}`;
                    this.frames = 0;
                    this.lastTime = time;
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const elapsedTime = this.clock.getElapsedTime();

                // Animate structural matrix tracking components
                const coreMesh = this.scene.getObjectByName("core_volume");
                if (coreMesh) {
                    coreMesh.rotation.y = elapsedTime * 0.5;
                    coreMesh.rotation.x = elapsedTime * 0.2;
                    coreMesh.position.y = Math.sin(elapsedTime * 1.5) * 0.5;
                }

                this.controls.update();
                this.renderer.render(this.scene, this.camera);
                
                this.trackMetrics();
            }
        }

        // Initialize Core System Build Lifecycle on window mount
        window.addEventListener('DOMContentLoaded', () => {
            new ApplicationState();
        });
    </script>
</body>
</html>
