<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>auxslop // Web UI Engine Port</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #191919; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Core UI Engine Framework (Ported from Rev::Element) ---
        class UIElement {
            constructor(parent = null, name = "Element") {
                this.name = name;
                this.parent = parent;
                this.children = [];
                this.style = {
                    width: 'auto',
                    height: 'auto',
                    padding: [0, 0, 0, 0], // Top, Right, Bottom, Left
                    backgroundColor: new THREE.Color(0xffffff),
                    backgroundAlpha: 0.0,
                    borderRadius: 0
                };
                
                // Three.js Object Representation
                this.group = new THREE.Group();
                this.mesh = null;

                if (parent) {
                    parent.addChild(this);
                }
            }

            addChild(child) {
                this.children.push(child);
                this.group.add(child.group);
            }

            // Simple layout calculation mock to mimic your C++ layout pass
            calculateLayout(computedWidth, computedHeight) {
                let w = this.style.width === '100%' ? computedWidth : (this.style.width || 2);
                let h = this.style.height === '100%' ? computedHeight : (this.style.height || 2);
                
                // Generate the visual plane if a background color/alpha is set
                if (this.style.backgroundAlpha > 0) {
                    if (this.mesh) this.group.remove(this.mesh);
                    
                    const geometry = new THREE.PlaneGeometry(w, h);
                    const material = new THREE.MeshBasicMaterial({
                        color: this.style.backgroundColor,
                        transparent: true,
                        opacity: this.style.backgroundAlpha,
                        side: THREE.DoubleSide
                    });
                    
                    this.mesh = new THREE.Mesh(geometry, material);
                    this.group.add(this.mesh);
                }

                // Recursively layout children nested inside
                this.children.forEach(child => {
                    // Primitive shrink/center offset calculation
                    child.calculateLayout(w * 0.8, h * 0.8);
                    // Push slightly forward on Z-axis to prevent Z-fighting texture glitching
                    child.group.position.z = 0.01; 
                });
            }
        }

        // --- Application Main ---
        class App {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                
                // Styles.ixx: Color backgroundColor = Color(0.1, 0.1, 0.1, 1.0);
                this.scene.background = new THREE.Color(0.1, 0.1, 0.1); 

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.set(0, 0, 12);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;

                this.initUserInterface();
                
                window.addEventListener('resize', () => this.onWindowResize());
                this.animate();
            }

            initUserInterface() {
                // Interface.ixx: Master interface container (this->style->size = 100_pct)
                this.mainInterface = new UIElement(null, "MainInterface");
                this.mainInterface.style.width = '100%';
                this.mainInterface.style.height = '100%';
                this.mainInterface.style.backgroundColor = new THREE.Color(0x191919); // rgba(25, 25, 25, 1.0)
                this.mainInterface.style.backgroundAlpha = 1.0;
                this.scene.add(this.mainInterface.group);

                // Interface.ixx: Grey box overlay layout
                this.greyBox = new UIElement(this.mainInterface, "GreyBox");
                this.greyBox.style.width = 6;  // Mock unit matching your max-width conversions
                this.greyBox.style.height = 4; // Mock unit matching your max-height conversions
                this.greyBox.style.backgroundColor = new THREE.Color(0xffffff); // rgba(255, 255, 255, 0.1)
                this.greyBox.style.backgroundAlpha = 0.1;

                // Testing the commented-out layout loop in Interface.ixx!
                // Let's spin up 100 stress-test nodes inside our viewport container
                const totalStressNodes = 100; 
                for (let i = 0; i < totalStressNodes; i++) {
                    let child = new UIElement(this.greyBox, `ChildNode_${i}`);
                    child.style.width = 0.2;
                    child.style.height = 0.2;
                    child.style.backgroundColor = new THREE.Color(0xff8080); // rgba(1, 0.5, 0.5, 1.0)
                    child.style.backgroundAlpha = 0.8;

                    // Arrange them in a quick grid layout algorithmically
                    let row = Math.floor(i / 10);
                    let col = i % 10;
                    child.group.position.set(-2.25 + (col * 0.5), 1.5 - (row * 0.5), 0);
                }

                // Fire initial layout tree calculation pass
                this.mainInterface.calculateLayout(10, 8);
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();

                // Gentle rotation so you can see it's a true 3D plane layout in space!
                if(this.mainInterface) {
                    this.mainInterface.group.rotation.y = Math.sin(Date.now() * 0.0005) * 0.2;
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        window.addEventListener('DOMContentLoaded', () => new App());
    </script>
</body>
</html>
