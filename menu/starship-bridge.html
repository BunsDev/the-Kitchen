<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship Bridge — Interactive 3D Experience</title>
    
    <!-- ── Primary Meta ─────────────────────────────────────────────────────── -->
    <meta name="description" content="Explore an immersive 3D starship bridge. Interactive command center with full camera controls and AR support.">
    
    <!-- ── Favicons ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="starship-favicon.png">
    <link rel="shortcut icon" type="image/png" href="starship-favicon.png">
    <link rel="apple-touch-icon" href="starship-favicon.png">
    
    <!-- ── Open Graph (Facebook, Discord, iMessage, etc.) ────────────────────── -->
    <meta property="og:title" content="Starship Bridge — Interactive 3D Experience">
    <meta property="og:description" content="Step onto the bridge of a starship. Explore every angle of this detailed 3D command center with intuitive camera controls.">
    <meta property="og:url" content="https://frymatic.us/menu/starship-bridge.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Starship Bridge">
    
    <meta property="og:image" content="https://yoursite.com/starship-bridge-preview.png">
    <meta property="og:image:alt" content="3D rendered starship bridge command center with control panels and captain's chair">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- ── Twitter / X Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Starship Bridge — Interactive 3D Experience">
    <meta name="twitter:description" content="Explore an immersive 3D starship bridge command center. Full camera controls, AR-ready.">
    <meta name="twitter:image" content="https://yoursite.com/starship-bridge-preview.png">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        /* Reset default margins and make html/body fill viewport */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Make model-viewer fill the entire viewport */
        model-viewer {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="starship_bridge.glb" 
        ar 
        camera-controls 
        touch-action="pan-y" 
        alt="Starship Bridge - 3D Interactive Model"
        auto-rotate
        rotation-per-second="15deg"
    ></model-viewer>
</body>
</html>
