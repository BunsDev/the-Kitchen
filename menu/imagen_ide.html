<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IMAGEN IDE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── Variables ── */
  :root{
    --bg0:#080a0c; --bg1:#0d1014; --bg2:#12171d; --bg3:#181e26;
    --border:#1e2830; --border2:#253040;
    --gold:#c9a84c; --gold2:#e8c870; --gold-dim:#7a6230;
    --teal:#3ab8c4; --teal-dim:#1d5e65;
    --red:#d94f4f; --green:#4fad6e;
    --text:#c8d4df; --text-dim:#6a8090; --text-bright:#e8f0f8;
    --pass-w:3px;
    --font-display:'Cinzel',serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-body:'Raleway',sans-serif;
    --radius:4px;
    --transition:all 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--font-body)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:var(--bg1)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

  /* ── Layout ── */
  #root{display:grid;height:100vh;
    grid-template-rows:44px 1fr 36px;
    grid-template-columns:260px 1fr 280px;
    grid-template-areas:
      "header header header"
      "left   center right"
      "footer footer footer";
  }

  /* ── Header ── */
  #header{
    grid-area:header;display:flex;align-items:center;
    padding:0 16px;gap:12px;
    background:var(--bg1);
    border-bottom:1px solid var(--border);
    position:relative;
    z-index:100;
  }
  #header h1{
    font-family:var(--font-display);font-size:15px;font-weight:600;
    letter-spacing:0.12em;color:var(--gold2);
    white-space:nowrap;
  }
  #header h1 span{color:var(--text-dim);font-weight:400;font-size:11px;margin-left:8px;font-family:var(--font-mono)}
  .hbadge{
    font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;
    padding:2px 8px;border:1px solid var(--border2);
    color:var(--text-dim);border-radius:2px;background:var(--bg2);
  }
  .hbadge.active{border-color:var(--teal-dim);color:var(--teal)}
  #header .spacer{flex:1}
  #api-key{
    font-family:var(--font-mono);font-size:10px;
    background:var(--bg2);border:1px solid var(--border2);
    color:var(--text);padding:4px 10px;border-radius:var(--radius);
    width:220px;outline:none;
    transition:var(--transition);
  }
  #api-key:focus{border-color:var(--gold-dim);color:var(--gold2)}
  #api-key::placeholder{color:var(--text-dim)}

  /* ── Panels ── */
  #left{grid-area:left;display:flex;flex-direction:column;background:var(--bg1);border-right:1px solid var(--border);overflow:hidden}
  #center{grid-area:center;display:flex;flex-direction:column;background:var(--bg0);overflow:hidden}
  #right{grid-area:right;display:flex;flex-direction:column;background:var(--bg1);border-left:1px solid var(--border);overflow:hidden}
  #footer{grid-area:footer;display:flex;align-items:center;padding:0 16px;gap:16px;background:var(--bg1);border-top:1px solid var(--border);font-family:var(--font-mono);font-size:9px;color:var(--text-dim)}
  #footer .fstatus{color:var(--teal)}
  #footer .fver{margin-left:auto;color:var(--gold-dim)}

  .panel-header{
    padding:8px 12px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;
    color:var(--gold);text-transform:uppercase;border-bottom:1px solid var(--border);
    background:var(--bg1);flex-shrink:0;display:flex;align-items:center;gap:8px;
  }
  .panel-header .dot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim)}
  .panel-body{flex:1;overflow-y:auto;padding:10px}

  /* ── Phase Navigator ── */
  .phase-nav{display:flex;flex-direction:column;gap:3px;padding:8px}
  .phase-item{
    display:flex;align-items:center;gap:8px;
    padding:7px 10px;border-radius:var(--radius);
    border:1px solid transparent;cursor:pointer;
    transition:var(--transition);position:relative;
  }
  .phase-item:hover{background:var(--bg2);border-color:var(--border2)}
  .phase-item.active{background:var(--bg3);border-color:var(--teal-dim)}
  .phase-item.done{border-color:var(--border2)}
  .phase-num{
    font-family:var(--font-mono);font-size:9px;font-weight:500;
    width:20px;height:20px;border-radius:2px;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg2);border:1px solid var(--border2);
    color:var(--text-dim);flex-shrink:0;
    transition:var(--transition);
  }
  .phase-item.active .phase-num{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
  .phase-item.done .phase-num{background:var(--bg2);border-color:var(--green);color:var(--green)}
  .phase-label{font-size:11px;font-weight:500;color:var(--text-dim);transition:var(--transition)}
  .phase-item.active .phase-label{color:var(--text-bright)}
  .phase-item.done .phase-label{color:var(--text)}
  .phase-sub{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);margin-top:1px}

  /* ── Manifest Editor ── */
  #manifest{
    flex:1;width:100%;font-family:var(--font-mono);font-size:10px;line-height:1.7;
    background:var(--bg0);color:var(--text);
    border:none;outline:none;resize:none;padding:12px;
    tab-size:2;
  }

  /* ── Center: Canvas + Console ── */
  #canvas-area{flex:1;position:relative;overflow:hidden}
  #cv{display:block;width:100%;height:100%}
  #console-area{
    height:200px;flex-shrink:0;
    border-top:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  #console-input-row{
    display:flex;align-items:center;gap:0;
    border-top:1px solid var(--border);flex-shrink:0;
  }
  #prompt-input{
    flex:1;font-family:var(--font-mono);font-size:11px;
    background:var(--bg2);border:none;color:var(--text);
    padding:10px 14px;outline:none;
    transition:var(--transition);
  }
  #prompt-input:focus{color:var(--text-bright)}
  #prompt-input::placeholder{color:var(--text-dim)}
  #run-btn{
    font-family:var(--font-display);font-size:10px;letter-spacing:0.1em;
    padding:10px 20px;background:var(--gold-dim);color:var(--gold2);
    border:none;cursor:pointer;transition:var(--transition);white-space:nowrap;
  }
  #run-btn:hover{background:var(--gold);color:#000}
  #run-btn:disabled{opacity:0.4;cursor:not-allowed}
  #console-log{
    flex:1;overflow-y:auto;padding:8px 12px;
    font-family:var(--font-mono);font-size:10px;line-height:1.8;
  }
  .log-line{display:flex;gap:8px}
  .log-tag{color:var(--gold);min-width:36px}
  .log-tag.teal{color:var(--teal)}
  .log-tag.red{color:var(--red)}
  .log-tag.green{color:var(--green)}
  .log-msg{color:var(--text);word-break:break-word;white-space:pre-wrap}

  /* ── Right: Pass Queue ── */
  .pass-queue{display:flex;flex-direction:column;gap:4px;padding:8px}
  .pass-item{
    padding:7px 10px;border-radius:var(--radius);
    border:1px solid var(--border);background:var(--bg2);
    display:flex;align-items:center;gap:8px;
    font-family:var(--font-mono);font-size:9px;
  }
  .pass-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--border2)}
  .pass-dot.running{background:var(--gold);animation:pulse 1s infinite}
  .pass-dot.done{background:var(--green)}
  .pass-dot.err{background:var(--red)}
  .pass-name{flex:1;color:var(--text-dim)}
  .pass-name.running{color:var(--gold2)}
  .pass-name.done{color:var(--text)}
  .pass-status{color:var(--text-dim)}
  .pass-status.done{color:var(--green)}

  /* ── KPI Dashboard ── */
  .kpi-grid{display:flex;flex-direction:column;gap:8px;padding:10px}
  .kpi-row{display:flex;flex-direction:column;gap:3px}
  .kpi-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.08em;color:var(--text-dim);text-transform:uppercase;display:flex;justify-content:space-between}
  .kpi-val{color:var(--text)}
  .kpi-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;position:relative}
  .kpi-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);background:var(--teal)}
  .kpi-fill.warn{background:var(--gold)}
  .kpi-fill.crit{background:var(--red)}

  /* ── Output box ── */
  #output-section{
    border-top:1px solid var(--border);padding:10px;
    font-family:var(--font-mono);font-size:9px;line-height:1.7;
    max-height:200px;overflow-y:auto;color:var(--text);
  }
  #output-section h4{font-family:var(--font-display);font-size:10px;letter-spacing:0.08em;color:var(--gold);margin-bottom:6px}

  /* ── Animations ── */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.3s ease forwards}

  /* ── Divider label ── */
  .divider{
    font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;
    color:var(--gold-dim);text-transform:uppercase;
    padding:4px 12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    background:var(--bg0);
  }
</style>
</head>
<body>
<div id="root">

  <!-- HEADER -->
  <header id="header">
    <h1>IMAGEN IDE <span>v2.0 · Consultant Edition</span></h1>
    <div class="hbadge active" id="badge-mode">FORGE</div>
    <div class="hbadge" id="badge-model">claude-sonnet-4</div>
    <div class="spacer"></div>
    <input id="api-key" type="password" placeholder="sk-ant-… (Anthropic API Key)" autocomplete="off"/>
  </header>

  <!-- LEFT: Phase Nav + Manifest -->
  <aside id="left">
    <div class="panel-header"><div class="dot"></div>PIPELINE</div>
    <div class="phase-nav" id="phase-nav">
      <!-- populated by JS -->
    </div>
    <div class="divider">MANIFEST</div>
    <textarea id="manifest" spellcheck="false"># IMAGEN Project Manifest
[project]
name    = "My Creation"
medium  = "image"          # image | object | narrative | diagram | hybrid
quality = "production"     # draft | production | exhibition
passes  = 3

[constraints]
aesthetic  = "high"
structural = "strict"
technical  = "moderate"

[deployment]
targets = ["diagram_doc"]
</textarea>
  </aside>

  <!-- CENTER: Canvas + Console -->
  <main id="center">
    <div id="canvas-area">
      <canvas id="cv"></canvas>
    </div>
    <div id="console-area">
      <div class="panel-header"><div class="dot"></div>INTENT CONSOLE</div>
      <div id="console-log"></div>
      <div id="console-input-row">
        <input id="prompt-input" type="text" placeholder="Describe your creative intent… (press Enter or click FORGE)"/>
        <button id="run-btn" onclick="runPipeline()">FORGE ▶</button>
      </div>
    </div>
  </main>

  <!-- RIGHT: Pass Queue + KPIs + Output -->
  <aside id="right">
    <div class="panel-header"><div class="dot"></div>PASS QUEUE</div>
    <div class="pass-queue" id="pass-queue"></div>
    <div class="divider">QUALITY KPIs</div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="divider">LAST OUTPUT</div>
    <div id="output-section">
      <div id="output-text" style="color:var(--text-dim);font-style:italic">No output yet. Run the pipeline to see results.</div>
    </div>
  </aside>

  <!-- FOOTER -->
  <footer id="footer">
    <span class="fstatus" id="f-status">READY</span>
    <span id="f-phase">—</span>
    <span id="f-delta"></span>
    <span class="fver">ImageN Kernel v2.0 · RED EYE · Brazen Studios, Inc.</span>
  </footer>

</div>

<script>
// ════════════════════════════════════════════════════════════
// IMAGEN IDE — Core Logic
// ════════════════════════════════════════════════════════════

const PHASES = [
  { id:"L0", label:"Intent Model",     sub:"Parse & structure intent" },
  { id:"L1", label:"Structural Model", sub:"Topology & hierarchy" },
  { id:"L2", label:"Authoring Core",   sub:"Generate base artifact" },
  { id:"L3", label:"Refinement",       sub:"Multi-pass polish" },
  { id:"L4", label:"Artifact Compiler",sub:"Package & validate" },
  { id:"L5", label:"Deployment Fabric",sub:"Route to targets" },
];

const PASS_SCHEDULE = [
  "Global composition alignment",
  "Structural / anatomical correction",
  "Saliency-targeted detail enhancement",
  "Confidence-gated micro refinement",
  "Typography & material harmonization",
];

const KPI_KEYS = ["coherence","structural_validity","detail_fidelity","export_readiness"];
const KPI_TARGETS = { coherence:0.90, structural_validity:0.95, detail_fidelity:0.88, export_readiness:0.92 };

let state = {
  running: false,
  phase: -1,
  kpis: {},
  passes: [],
  lastOutput: "",
  history: [],
};

// ── Canvas ───────────────────────────────────────────────────
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let raf, t=0;
let nodes=[], particles=[];

function resizeCanvas(){
  const r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width; cv.height = r.height;
  buildNodes();
}

function buildNodes(){
  const W=cv.width, H=cv.height;
  nodes = PHASES.map((p,i)=>{
    const col = i/(PHASES.length-1);
    return { id:p.id, label:p.label, x: W*0.12 + col*(W*0.76),
      y: H*0.5 + Math.sin(col*Math.PI)*H*-0.12, r:22, phase:i };
  });
  particles=[];
}

function spawnParticle(from, to){
  particles.push({ x:from.x, y:from.y, tx:to.x, ty:to.y, p:0, speed:0.012+Math.random()*0.01 });
}

function drawCanvas(){
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle="rgba(30,40,50,0.6)";ctx.lineWidth=0.5;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Edges
  for(let i=0;i<nodes.length-1;i++){
    const a=nodes[i],b=nodes[i+1];
    const done = state.phase>i, active=state.phase===i;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle = done?"rgba(58,184,196,0.4)": active?"rgba(201,168,76,0.4)":"rgba(30,48,64,0.8)";
    ctx.lineWidth = done?2:1.5;ctx.stroke();
  }

  // Particles
  for(let p of particles){
    p.p=Math.min(1,p.p+p.speed);
    const px=p.x+(p.tx-p.x)*p.p, py=p.y+(p.ty-p.y)*p.p;
    const alpha=Math.sin(p.p*Math.PI);
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${alpha})`;ctx.fill();
  }
  particles=particles.filter(p=>p.p<1);

  // Nodes
  for(let n of nodes){
    const i=n.phase;
    const done=state.phase>i, active=state.phase===i;
    const glow = done?12: active? (14+Math.sin(t*4)*3) :0;

    if(glow>0){
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r+glow);
      g.addColorStop(0, done?"rgba(58,184,196,0.25)":"rgba(201,168,76,0.3)");
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+glow,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }

    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle = done?"#0d2028": active?"#1a2010":"#0d1014";
    ctx.strokeStyle = done?"#3ab8c4": active?"#c9a84c":"#1e2830";
    ctx.lineWidth = active?2:1.5;
    ctx.fill();ctx.stroke();

    ctx.fillStyle = done?"#3ab8c4": active?"#c9a84c":"#6a8090";
    ctx.font=`${active?12:10}px 'Cinzel',serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(n.id,n.x,n.y);

    ctx.fillStyle = active?"#e8c870":"#6a8090";
    ctx.font="8px 'Raleway',sans-serif";ctx.textAlign="center";
    ctx.fillText(n.label,n.x,n.y+n.r+12);
  }

  t+=0.016;
  raf=requestAnimationFrame(drawCanvas);
}

// ── Phase Navigator ───────────────────────────────────────────
function buildPhaseNav(){
  const el=document.getElementById("phase-nav");
  el.innerHTML=PHASES.map((p,i)=>`
    <div class="phase-item" id="pnav-${i}">
      <div class="phase-num">${p.id}</div>
      <div>
        <div class="phase-label">${p.label}</div>
        <div class="phase-sub">${p.sub}</div>
      </div>
    </div>`).join("");
}

function updatePhaseNav(phase){
  PHASES.forEach((_,i)=>{
    const el=document.getElementById(`pnav-${i}`);
    if(!el)return;
    el.className="phase-item"+(i<phase?" done":i===phase?" active":"");
  });
}

// ── Pass Queue ────────────────────────────────────────────────
function buildPassQueue(passes){
  const el=document.getElementById("pass-queue");
  el.innerHTML=passes.map(p=>`
    <div class="pass-item fade-in">
      <div class="pass-dot ${p.state}"></div>
      <div class="pass-name ${p.state}">${p.name}</div>
      <div class="pass-status ${p.state}">${p.state==='done'?'✓':p.state==='running'?'…':''}</div>
    </div>`).join("");
}

// ── KPI Grid ──────────────────────────────────────────────────
function buildKPIGrid(){
  const el=document.getElementById("kpi-grid");
  el.innerHTML=KPI_KEYS.map(k=>{
    const v=state.kpis[k]??0, t=KPI_TARGETS[k];
    const pct=Math.round(v*100);
    const cls=v>=t?"":"v<t-0.1?"warn ":"crit ";
    const label=k.replace(/_/g," ");
    return `
    <div class="kpi-row">
      <div class="kpi-label">
        <span>${label}</span>
        <span class="kpi-val">${pct}%</span>
      </div>
      <div class="kpi-track">
        <div class="kpi-fill ${cls}" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join("");
}

// ── Console Log ───────────────────────────────────────────────
function clog(tag, msg, color="teal"){
  const el=document.getElementById("console-log");
  const line=document.createElement("div");
  line.className="log-line fade-in";
  line.innerHTML=`<span class="log-tag ${color}">${tag}</span><span class="log-msg">${escHtml(msg)}</span>`;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function setStatus(s, phase=""){
  document.getElementById("f-status").textContent=s;
  document.getElementById("f-phase").textContent=phase;
}

// ── Anthropic API call ────────────────────────────────────────
async function callClaude(systemPrompt, messages, maxTokens=900){
  const key=document.getElementById("api-key").value.trim();
  if(!key) throw new Error("No API key provided. Paste your Anthropic key in the header.");
  const body={
    model:"claude-sonnet-4-20250514",
    max_tokens:maxTokens,
    messages,
  };
  if(systemPrompt) body.system=systemPrompt;
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body:JSON.stringify(body)
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${resp.status}`);
  }
  const data=await resp.json();
  return data.content[0].text;
}

const SYS=`You are the IMAGEN Engine — a structured creative operating system.
Produce precise, detailed, actionable creative specifications.
Principles: intent first, structure driven, aesthetic precision, endless iteration, boundless creation.
Every response is specific, concrete, and actionable. Never be vague.`;

async function evaluate(output, intent){
  const prompt=`Score this creative artifact output on four dimensions, 0.0-1.0.
Intent: "${intent}"
Output: ${output.slice(0,800)}

Return ONLY valid JSON (no prose, no markdown):
{"coherence":0.0,"structural_validity":0.0,"detail_fidelity":0.0,"export_readiness":0.0}`;
  try{
    const txt=await callClaude(null,[{role:"user",content:prompt}],200);
    const clean=txt.replace(/```[a-z]*/g,"").replace(/```/g,"").trim();
    const scores=JSON.parse(clean);
    return Object.fromEntries(Object.entries(scores).map(([k,v])=>[k,parseFloat(v)||0]));
  }catch{
    return {coherence:0.72,structural_validity:0.70,detail_fidelity:0.68,export_readiness:0.55};
  }
}

// ── Pipeline Runner ───────────────────────────────────────────
async function runPipeline(){
  if(state.running) return;
  const intent=document.getElementById("prompt-input").value.trim();
  if(!intent){clog("ERR","Please enter a creative intent.","red");return;}

  const key=document.getElementById("api-key").value.trim();
  if(!key){clog("ERR","Paste your Anthropic API key in the header first.","red");return;}

  state.running=true;
  document.getElementById("run-btn").disabled=true;
  document.getElementById("console-log").innerHTML="";
  state.passes=[];state.kpis={};state.phase=-1;

  let intentOut="", structOut="", draft="", compiled="";

  const passes=[
    {name:"L0 · Intent Model",state:"pending"},
    {name:"L1 · Structural Model",state:"pending"},
    {name:"L2 · Authoring Core",state:"pending"},
    ...PASS_SCHEDULE.map((s,i)=>({name:`L3.${i+1} · ${s}`,state:"pending"})),
    {name:"L4 · Artifact Compiler",state:"pending"},
    {name:"L5 · Deployment",state:"pending"},
  ];

  const updatePass=(idx,st)=>{passes[idx].state=st;buildPassQueue(passes)};

  const runPhase=async(phaseIdx, passIdx, fn)=>{
    state.phase=phaseIdx;
    updatePhaseNav(phaseIdx);
    updatePass(passIdx,"running");
    if(nodes[phaseIdx] && phaseIdx>0) spawnParticle(nodes[phaseIdx-1],nodes[phaseIdx]);
    try{
      const result=await fn();
      updatePass(passIdx,"done");
      const kpis=await evaluate(result,intent);
      state.kpis=kpis;
      buildKPIGrid();
      return result;
    }catch(e){
      updatePass(passIdx,"err");
      clog("ERR",e.message,"red");
      throw e;
    }
  };

  try{
    // ── L0
    setStatus("RUNNING","L0 · Intent");
    clog("L0","Parsing creative intent…");
    intentOut=await runPhase(0,0,async()=>{
      const out=await callClaude(SYS,[{role:"user",content:
        `You are L0 Intent Model. Raw intent: "${intent}"\n\nProduce a structured Intent Manifest:\n1. GOAL\n2. MEDIUM\n3. AESTHETIC SEED (3-5 attractors)\n4. CONSTRAINTS\n5. SCOPE\n6. AUDIENCE\n7. OPEN QUESTIONS\n\nBe specific and actionable.`
      }]);
      clog("L0","Intent manifest generated ✓","green");
      return out;
    });

    // ── L1
    setStatus("RUNNING","L1 · Structure");
    clog("L1","Building topology and hierarchy…");
    structOut=await runPhase(1,1,async()=>{
      const out=await callClaude(SYS,[
        {role:"user",content:`L0 output:\n${intentOut}\n\nYou are L1 Structural Model. Produce:\n1. COMPONENT HIERARCHY\n2. DEPTH MAP\n3. RELATIONSHIP MATRIX\n4. ARTICULATION POINTS\n5. LOAD PATHS\n6. CONSTRAINT PROPAGATION\n\nUse concrete names.`}
      ]);
      clog("L1","Structure mapped ✓","green");
      return out;
    });

    // ── L2
    setStatus("RUNNING","L2 · Authoring");
    clog("L2","Generating primary artifact draft…");
    draft=await runPhase(2,2,async()=>{
      const out=await callClaude(SYS,[
        {role:"user",content:`Intent:\n${intentOut.slice(0,500)}\n\nStructure:\n${structOut.slice(0,500)}\n\nYou are L2 Authoring Core. Produce a richly detailed creative specification. Describe every component with material, texture, proportion, color, and function. Be exhaustive.`}
      ]);
      clog("L2","Draft artifact generated ✓","green");
      return out;
    });

    // ── L3 passes
    setStatus("RUNNING","L3 · Refinement");
    for(let i=0;i<PASS_SCHEDULE.length;i++){
      clog("L3",`Pass ${i+1}: ${PASS_SCHEDULE[i]}…`,"teal");
      draft=await runPhase(3,3+i,async()=>{
        const out=await callClaude(SYS,[
          {role:"user",content:`L3 Pass ${i+1} — Focus: ${PASS_SCHEDULE[i]}\n\nIntent: ${intent}\n\nCurrent draft:\n${draft.slice(0,700)}\n\nFind the weakest element relative to the intent and improve it surgically. Return the FULL improved specification with [PASS ${i+1} CHANGES] section at end.`}
        ]);
        clog("L3",`Pass ${i+1} complete ✓`,"green");
        // Check convergence
        const kv=Object.values(state.kpis);
        const avg=kv.reduce((a,b)=>a+b,0)/kv.length;
        if(avg>=0.92){ clog("L3","Converged early — stopping refinement passes","teal"); return out; }
        return out;
      });
    }

    // ── L4
    setStatus("RUNNING","L4 · Compiler");
    clog("L4","Packaging artifact…");
    compiled=await runPhase(4,3+PASS_SCHEDULE.length,async()=>{
      const out=await callClaude(SYS,[
        {role:"user",content:`You are L4 Artifact Compiler.\n\nRefined output:\n${draft.slice(0,900)}\n\nProduce:\n## ASSET MANIFEST\n## TECHNICAL SPECIFICATION\n## QUALITY CERTIFICATE\n## INTEGRATION HOOKS\n## USAGE GUIDE`}
      ]);
      clog("L4","Artifact compiled ✓","green");
      return out;
    });

    // ── L5
    setStatus("RUNNING","L5 · Deploy");
    clog("L5","Routing to deployment targets…");
    state.phase=5;
    updatePhaseNav(5);
    updatePass(3+PASS_SCHEDULE.length+1,"done");
    clog("L5","Pipeline complete ✓","green");

    // Show output
    state.lastOutput=compiled;
    document.getElementById("output-text").innerHTML=`<strong style="color:var(--gold)">L4 Compiled Artifact</strong><br><br>${escHtml(compiled.slice(0,800))}${compiled.length>800?"<br><em style='color:var(--text-dim)'>[… truncated — full output in state]</em>":""}`;

    setStatus("COMPLETE ✓","Pipeline finished");
    updatePhaseNav(6);

  } catch(e){
    setStatus("ERROR","Pipeline halted");
    clog("SYS",`Pipeline error: ${e.message}`,"red");
  } finally{
    state.running=false;
    document.getElementById("run-btn").disabled=false;
  }
}

// ── Keyboard shortcut ─────────────────────────────────────────
document.getElementById("prompt-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();runPipeline();}
});

// ── Manifest persistence ──────────────────────────────────────
const mfst=document.getElementById("manifest");
const savedMf=localStorage.getItem("imagen_manifest");
if(savedMf) mfst.value=savedMf;
mfst.addEventListener("input",()=>localStorage.setItem("imagen_manifest",mfst.value));

const savedKey=localStorage.getItem("imagen_api_key");
if(savedKey) document.getElementById("api-key").value=savedKey;
document.getElementById("api-key").addEventListener("input",e=>{
  localStorage.setItem("imagen_api_key",e.target.value);
});

// ── Init ──────────────────────────────────────────────────────
buildPhaseNav();
buildPassQueue([]);
buildKPIGrid();
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
drawCanvas();

// Set up initial pass queue display
const initPasses=PHASES.map(p=>({name:`${p.id} · ${p.label}`,state:"pending"}));
buildPassQueue(initPasses);

// Footer invocation
document.getElementById("f-status").textContent="READY";
document.getElementById("f-phase").textContent="We engrave worlds from ideas.";
</script>
</body>
</html>
